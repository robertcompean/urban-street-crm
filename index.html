<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Urban Street CRM</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#f4f4f5;font-family:'Barlow Condensed',sans-serif;}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#f4f4f5}
  ::-webkit-scrollbar-thumb{background:#d0d0d5;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#b0b0b8}
  .us-table-wrap{width:100%;overflow-x:auto}
  .us-table{width:100%;border-collapse:collapse;font-size:15px}
  .us-table thead th{background:#ffffff;color:#888;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid #e2e2e5;white-space:nowrap;position:sticky;top:0;z-index:2}
  .us-table tbody tr{border-bottom:1px solid #e2e2e5;cursor:pointer;transition:background .1s}
  .us-table tbody tr:hover{background:#f0f0f2}
  .us-table tbody tr:hover .us-row-arrow{opacity:1;transform:translateX(0)}
  .us-table tbody td{padding:10px 12px;vertical-align:middle;white-space:nowrap}
  .us-row-arrow{opacity:0;transform:translateX(-4px);transition:all .15s;color:#e8622a}
  .us-detail{animation:slideIn .22s cubic-bezier(.16,1,.3,1)}
  @keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
  .us-field-card{background:#fff;border:1px solid #e2e2e5;border-radius:4px;transition:border-color .15s}
  .us-field-card:hover{border-color:#bbbbc2}
  .us-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
  .us-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:transparent;border:1px solid #d0d0d5;color:#666;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s}
  .us-btn:hover{border-color:#e8622a;color:#e8622a;background:rgba(232,98,42,.04)}
  .us-btn:disabled{opacity:0.5;cursor:not-allowed}
  .us-save-btn{background:#e8622a;border-color:#e8622a;color:#fff;font-weight:700}
  .us-save-btn:hover:not(:disabled){background:#c8501a;border-color:#c8501a;color:#fff}
  .us-delete-btn{border-color:#cc2222;color:#cc2222}
  .us-delete-btn:hover{background:rgba(204,34,34,.06);border-color:#cc2222;color:#cc2222}
  .us-edit-contact-btn{background:#e8622a;border-color:#e8622a;color:#fff;font-weight:700}
  .us-edit-contact-btn:hover{background:#c8501a;border-color:#c8501a;color:#fff}
  .us-section-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#999;margin-bottom:8px}
  .us-mono{font-family:'JetBrains Mono',monospace}
  .us-search{background:#fff;border:1px solid #d0d0d5;color:#111;font-family:'Barlow Condensed',sans-serif;font-size:15px;padding:10px 16px;border-radius:3px;outline:none;width:240px;transition:border-color .15s}
  .us-search:focus{border-color:#e8622a}
  .us-search::placeholder{color:#aaa}
  .us-loading{display:flex;align-items:center;justify-content:center;min-height:300px;gap:12px;color:#999;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em}
  .us-spinner{width:20px;height:20px;border:2px solid #e2e2e5;border-top-color:#e8622a;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .us-input{background:#fff;border:1px solid #d0d0d5;border-radius:3px;color:#111;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;padding:10px 14px;width:100%;outline:none;transition:border-color .15s}
  .us-input:focus{border-color:#e8622a}
  .us-input::placeholder{color:#bbb;font-weight:400}
  .us-input-mono{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:400}
  .us-select{background:#fff;border:1px solid #d0d0d5;border-radius:3px;color:#111;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;padding:10px 14px;width:100%;outline:none;transition:border-color .15s;cursor:pointer;-webkit-appearance:none;appearance:none}
  .us-select:focus{border-color:#e8622a}
  .us-textarea{background:#fff;border:1px solid #d0d0d5;border-radius:3px;color:#111;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;padding:12px 14px;width:100%;min-height:100px;resize:vertical;outline:none;transition:border-color .15s}
  .us-textarea:focus{border-color:#e8622a}
  .us-textarea::placeholder{color:#bbb}
  .us-tag{display:inline-block;padding:2px 8px;background:#f0f0f2;border:1px solid #e2e2e5;border-radius:2px;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;color:#666}
  .us-tag-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(232,98,42,.08);border:1px solid rgba(232,98,42,.3);border-radius:12px;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;color:#e8622a}
  .us-tag-pill-remove{cursor:pointer;opacity:.6;font-size:14px;line-height:1;transition:opacity .1s}
  .us-tag-pill-remove:hover{opacity:1}
  .us-tag-available{display:inline-flex;align-items:center;padding:4px 10px;background:transparent;border:1px solid #d0d0d5;border-radius:12px;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;color:#888;cursor:pointer;transition:all .15s}
  .us-tag-available:hover{border-color:#e8622a;color:#e8622a;background:rgba(232,98,42,.04)}
  .us-divider{border:none;border-top:1px solid #e2e2e5;margin:24px 0}
  .us-avatar{width:52px;height:52px;background:#f0f0f2;border:1px solid #e2e2e5;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#e8622a;flex-shrink:0}
  .us-toast{position:fixed;bottom:24px;right:24px;background:#e8622a;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;padding:10px 20px;border-radius:3px;animation:toastIn .2s ease;z-index:999}
  .us-toast-red{background:#cc2222;color:#fff}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .edit-section{background:#fff;border:1px solid #e2e2e5;border-radius:4px;padding:20px;display:flex;flex-direction:column;gap:16px}
  .edit-section-title{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#e8622a;margin-bottom:4px}
  /* Confirm modal */
  .us-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
  .us-modal{background:#fff;border:1px solid #e2e2e5;border-radius:6px;padding:32px;max-width:400px;width:90%;text-align:center}
  /* Column settings panel */
  .us-settings-panel{position:absolute;top:100%;right:0;background:#fff;border:1px solid #d0d0d5;border-radius:4px;padding:16px;min-width:200px;z-index:10;margin-top:6px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
  .us-col-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e2e2e5;cursor:pointer;gap:12px}
  .us-col-toggle:last-child{border-bottom:none}
  .us-col-toggle-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:#888;text-transform:uppercase}
  .us-col-toggle:hover .us-col-toggle-label{color:#111}
  .us-switch{width:28px;height:16px;background:#d0d0d5;border-radius:8px;position:relative;flex-shrink:0;transition:background .15s}
  .us-switch.on{background:#e8622a}
  .us-switch::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .15s}
  .us-switch.on::after{transform:translateX(12px)}
  /* Conversations */
  .us-conv-thread{transition:border-color .15s,background .15s}
  .us-conv-thread:hover{border-color:#bbbbc2 !important}
  .us-msg-bubble{transition:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const SUPABASE_URL = "https://kdxbkwcvrihcxqhukjee.supabase.co";
const SUPABASE_KEY = "sb_publishable_9whlg1wqquwmjgivsavs0A_H7HpbgE9";

const supaFetch = async (path, options = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...options,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: "return=representation",
      ...(options.headers || {}),
    },
  });
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

const C = {
  bg:"#f4f4f5", surface:"#ffffff", elevated:"#f9f9f9", border:"#e2e2e5",
  accent:"#e8622a", text:"#111111", textSub:"#555555", textMuted:"#999999",
  red:"#cc2222", green:"#1a7f3c", orange:"#c45c00",
};

const fmt = {
  date: (v) => {
    if (!v) return "—";
    const d = new Date(v);
    return isNaN(d) ? v : d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  },
  phone: (v) => {
    if (!v) return "—";
    const d = String(v).replace(/\D/g,"");
    if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    if (d.length === 11 && d[0]==="1") return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
    return v;
  },
  val: (v) => (v == null || v === "" ? "—" : String(v)),
};

const subColor = (status) => {
  const s = String(status || "").toLowerCase();
  if (s==="active"||s==="subscribed"||s==="true") return C.green;
  if (s==="unsubscribed"||s==="false") return C.red;
  if (s==="pending") return C.orange;
  return C.textSub;
};

const formatPhoneInput = (v) => {
  const d = String(v||"").replace(/\D/g,"").slice(0,10);
  if (d.length < 4) return d;
  if (d.length < 7) return `(${d.slice(0,3)}) ${d.slice(3)}`;
  return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
};

const formatDateInput = (v) => {
  const d = String(v||"").replace(/\D/g,"").slice(0,8);
  if (d.length < 3) return d;
  if (d.length < 5) return `${d.slice(0,2)}/${d.slice(2)}`;
  return `${d.slice(0,2)}/${d.slice(2,4)}/${d.slice(4)}`;
};
const toISODate = (v) => {
  if (!v) return null;
  const parts = v.split("/");
  if (parts.length === 3 && parts[2].length === 4) return `${parts[2]}-${parts[0].padStart(2,"0")}-${parts[1].padStart(2,"0")}`;
  return v;
};
const toDisplayDate = (v) => {
  if (!v) return "";
  const parts = v.split("-");
  if (parts.length === 3) return `${parts[1]}/${parts[2]}/${parts[0]}`;
  return v;
};

// ── Read-only field components
const PhoneField = ({ label, value }) => (
  <div className="us-field-card" style={{padding:"14px 16px"}}>
    <div className="us-section-label">{label}</div>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <span className="us-mono" style={{fontSize:15,color:C.text}}>{fmt.phone(value)}</span>
      {value && <a href={`tel:${value}`} style={{color:C.accent,fontSize:11,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",textDecoration:"none",border:`1px solid ${C.border}`,padding:"2px 8px",borderRadius:2}}>CALL</a>}
    </div>
  </div>
);

const SubBadge = ({ value }) => {
  const color = subColor(value);
  const label = value == null || value === "" ? "UNKNOWN" : String(value).toUpperCase();
  return (
    <div className="us-field-card" style={{padding:"14px 16px"}}>
      <div className="us-section-label">Subscription Status</div>
      <span className="us-badge" style={{background:`${color}22`,border:`1px solid ${color}55`,color}}>
        <span style={{width:6,height:6,borderRadius:"50%",background:color,display:"inline-block"}}/>
        {label}
      </span>
    </div>
  );
};

// ── Edit field components
const EField = ({ label, field, form, onChange, mono=false, placeholder="" }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <input className={`us-input${mono?" us-input-mono":""}`} value={form[field]||""} onChange={e=>onChange(field,e.target.value)} placeholder={placeholder||label}/>
  </div>
);

const EPhoneField = ({ label, field, form, onChange }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <input className="us-input us-input-mono" value={form[field]||""} onChange={e=>onChange(field,formatPhoneInput(e.target.value))} placeholder="(000) 000-0000"/>
  </div>
);

const EDateField = ({ label, field, form, onChange }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <input className="us-input us-input-mono" value={toDisplayDate(form[field])||""} onChange={e=>onChange(field,toISODate(formatDateInput(e.target.value)))} placeholder="MM/DD/YYYY"/>
  </div>
);

const ESelect = ({ label, field, form, options, onChange }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <div style={{position:"relative"}}>
      <select className="us-select" value={form[field]||""} onChange={e=>onChange(field,e.target.value)}>
        <option value="">— Select —</option>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
      <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:"#555",pointerEvents:"none",fontSize:10}}>▼</span>
    </div>
  </div>
);

// ── Buckets Section (junction-table based, like TagsSection)
const BucketsSection = ({ contactId, editing }) => {
  const [allBuckets, setAllBuckets] = useState([]);
  const [contactBuckets, setContactBuckets] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newName, setNewName] = useState("");
  const [adding, setAdding] = useState(false);
  const [showNew, setShowNew] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const [all, cb] = await Promise.all([
        supaFetch("/buckets?order=name.asc"),
        supaFetch(`/contact_buckets?contact_id=eq.${contactId}&select=bucket_id`),
      ]);
      setAllBuckets(all||[]);
      setContactBuckets((cb||[]).map(r=>r.bucket_id));
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  useEffect(() => { load(); }, [contactId]);

  const addBucket = async (bucketId) => {
    try {
      await supaFetch("/contact_buckets", { method:"POST", body:JSON.stringify({ contact_id:contactId, bucket_id:bucketId }) });
      setContactBuckets(prev=>[...prev, bucketId]);
    } catch(e) { console.error(e); }
  };

  const removeBucket = async (bucketId) => {
    try {
      await supaFetch(`/contact_buckets?contact_id=eq.${contactId}&bucket_id=eq.${bucketId}`, { method:"DELETE", headers:{Prefer:""} });
      setContactBuckets(prev=>prev.filter(id=>id!==bucketId));
    } catch(e) { console.error(e); }
  };

  const createAndAdd = async () => {
    const name = newName.trim();
    if (!name) return;
    setAdding(true);
    try {
      const result = await supaFetch("/buckets", { method:"POST", body:JSON.stringify({ name }) });
      const created = Array.isArray(result) ? result[0] : result;
      setAllBuckets(prev=>[...prev, created].sort((a,b)=>a.name.localeCompare(b.name)));
      await supaFetch("/contact_buckets", { method:"POST", body:JSON.stringify({ contact_id:contactId, bucket_id:created.id }) });
      setContactBuckets(prev=>[...prev, created.id]);
      setNewName(""); setShowNew(false);
    } catch(e) { alert("Failed to create bucket: "+e.message); }
    setAdding(false);
  };

  const assigned = allBuckets.filter(b=>contactBuckets.includes(b.id));
  const available = allBuckets.filter(b=>!contactBuckets.includes(b.id));

  if (loading) return <div style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>Loading…</div>;

  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom: editing && available.length ? 10 : 0}}>
        {assigned.length === 0 && !editing && <span style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No buckets</span>}
        {assigned.map(b=>(
          <span key={b.id} className="us-tag-pill">
            {b.name}
            {editing && <span className="us-tag-pill-remove" onClick={()=>removeBucket(b.id)}>×</span>}
          </span>
        ))}
      </div>
      {editing && available.length > 0 && (
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em",color:C.textMuted,textTransform:"uppercase",marginBottom:8}}>Add bucket</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {available.map(b=>(
              <span key={b.id} className="us-tag-available" onClick={()=>addBucket(b.id)}>+ {b.name}</span>
            ))}
          </div>
        </div>
      )}
      {editing && (
        showNew ? (
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <input className="us-input" value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")createAndAdd();if(e.key==="Escape"){setShowNew(false);setNewName("");}}}
              placeholder="New bucket name…" style={{fontSize:13,padding:"6px 10px"}} autoFocus/>
            <button className="us-btn us-save-btn" onClick={createAndAdd} disabled={adding||!newName.trim()} style={{padding:"6px 14px",fontSize:12}}>
              {adding?"…":"ADD"}
            </button>
            <button className="us-btn" onClick={()=>{setShowNew(false);setNewName("");}} style={{padding:"6px 10px",fontSize:12}}>✕</button>
          </div>
        ) : (
          <span className="us-tag-available" onClick={()=>setShowNew(true)} style={{marginTop:4,display:"inline-flex"}}>+ New bucket type</span>
        )
      )}
    </div>
  );
};

// ── Confirm Delete Modal
const ConfirmModal = ({ name, onConfirm, onCancel, loading }) => (
  <div className="us-modal-overlay">
    <div className="us-modal">
      <div style={{fontSize:18,fontWeight:700,color:C.red,marginBottom:8,letterSpacing:"0.02em"}}>DELETE CONTACT</div>
      <div style={{fontSize:15,color:C.textSub,marginBottom:24,lineHeight:1.5}}>
        Are you sure you want to delete <span style={{color:C.text,fontWeight:700}}>{name}</span>? This cannot be undone.
      </div>
      <div style={{display:"flex",gap:10,justifyContent:"center"}}>
        <button className="us-btn" onClick={onCancel} disabled={loading}>CANCEL</button>
        <button className="us-btn us-delete-btn" onClick={onConfirm} disabled={loading} style={{background:"rgba(255,68,68,.1)"}}>
          {loading ? "DELETING…" : "✕ DELETE"}
        </button>
      </div>
    </div>
  </div>
);

// ── Tags section on contact detail
const TagsSection = ({ contactId, editing }) => {
  const [allTags, setAllTags] = useState([]);
  const [contactTags, setContactTags] = useState([]);
  const [loadingTags, setLoadingTags] = useState(true);

  useEffect(() => {
    const fetchTags = async () => {
      setLoadingTags(true);
      try {
        const [all, ct] = await Promise.all([
          supaFetch("/tags?order=name.asc"),
          supaFetch(`/contact_tags?contact_id=eq.${contactId}&select=tag_id`),
        ]);
        setAllTags(all||[]);
        setContactTags((ct||[]).map(r=>r.tag_id));
      } catch(e) { console.error(e); }
      setLoadingTags(false);
    };
    fetchTags();
  }, [contactId]);

  const addTag = async (tagId) => {
    try {
      await supaFetch("/contact_tags", { method:"POST", body:JSON.stringify({ contact_id:contactId, tag_id:tagId }) });
      setContactTags(prev=>[...prev, tagId]);
    } catch(e) { console.error(e); }
  };

  const removeTag = async (tagId) => {
    try {
      await supaFetch(`/contact_tags?contact_id=eq.${contactId}&tag_id=eq.${tagId}`, { method:"DELETE", headers:{ Prefer:"" } });
      setContactTags(prev=>prev.filter(id=>id!==tagId));
    } catch(e) { console.error(e); }
  };

  const assigned = allTags.filter(t=>contactTags.includes(t.id));
  const available = allTags.filter(t=>!contactTags.includes(t.id));

  if (loadingTags) return <div style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>Loading tags…</div>;

  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom: editing && available.length ? 10 : 0}}>
        {assigned.length === 0 && !editing && <span style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No tags</span>}
        {assigned.map(t=>(

// Build RFC 2822 email + base64url encode
const buildRawEmail = ({ to, subject, body, sigHtml, fromEmail }) => {
  const boundary = `boundary_${Date.now()}`;
  const plainBody = body;
  const htmlBody = `<div style="font-family:Arial,sans-serif;font-size:14px;line-height:1.6;color:#222;">${body.replace(/\n/g,"<br/>")}</div>${sigHtml ? `<br/>${sigHtml}` : ""}`;

  const raw = [
    `From: ${fromEmail || gmailUserEmail}`,
    `To: ${to}`,
    `Subject: ${subject}`,
    "MIME-Version: 1.0",
    `Content-Type: multipart/alternative; boundary="${boundary}"`,
    "",
    `--${boundary}`,
    "Content-Type: text/plain; charset=UTF-8",
    "",
    plainBody,
    "",
    `--${boundary}`,
    "Content-Type: text/html; charset=UTF-8",
    "",
    htmlBody,
    "",
    `--${boundary}--`,
  ].join("\r\n");

  return btoa(unescape(encodeURIComponent(raw)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
};

// Send one email via Gmail API
const gmailSend = async ({ to, subject, body, sigHtml, fromEmail }) => {
  const raw = buildRawEmail({ to, subject, body, sigHtml, fromEmail });
  return gmailFetch("/users/me/messages/send", {
    method: "POST",
    body: JSON.stringify({ raw }),
  });
};

// Fetch messages for a contact email, sync to Supabase
const gmailSyncContact = async (contactId, contactEmail) => {
  // Search for threads involving this contact
  const q = encodeURIComponent(`from:${contactEmail} OR to:${contactEmail}`);
  const list = await gmailFetch(`/users/me/threads?q=${q}&maxResults=20`);
  if (!list?.threads?.length) return [];

  const synced = [];
  for (const t of list.threads) {
    const thread = await gmailFetch(`/users/me/threads/${t.id}?format=full`);
    if (!thread?.messages?.length) continue;

    const firstMsg = thread.messages[0];
    const headers = firstMsg.payload?.headers || [];
    const getH = (n) => headers.find(h=>h.name.toLowerCase()===n.toLowerCase())?.value || "";
    const subject = getH("Subject") || "(no subject)";
    const lastMsg = thread.messages[thread.messages.length - 1];
    const lastHeaders = lastMsg.payload?.headers || [];
    const getLH = (n) => lastHeaders.find(h=>h.name.toLowerCase()===n.toLowerCase())?.value || "";
    const lastDate = new Date(parseInt(lastMsg.internalDate));

    const lastIsOut = getLH("From").toLowerCase().includes(gmailUserEmail?.split("@")[0]?.toLowerCase() || "___");
    const lastDirection = lastIsOut ? "outbound" : "inbound";

    // Upsert conversation in Supabase
    let conv;
    try {
      const existing = await supaFetch(`/conversations?gmail_thread_id=eq.${t.id}&select=id`);
      if (existing?.length) {
        conv = existing[0];
        await supaFetch(`/conversations?id=eq.${conv.id}`, {
          method: "PATCH",
          body: JSON.stringify({ last_message_at: lastDate.toISOString(), snippet: getSnippet(lastMsg), last_direction: lastDirection }),
        });
      } else {
        const res = await supaFetch("/conversations", {
          method: "POST",
          body: JSON.stringify({
            contact_id: contactId,
            gmail_thread_id: t.id,
            subject,
            snippet: getSnippet(firstMsg),
            last_message_at: lastDate.toISOString(),
            unread: false,
            last_direction: lastDirection,
          }),
        });
        conv = Array.isArray(res) ? res[0] : res;
      }
    } catch(e) { console.error("Conv upsert error:", e); continue; }

    // Upsert each message
    for (const msg of thread.messages) {
      try {
        const mHeaders = msg.payload?.headers || [];
        const mGetH = (n) => mHeaders.find(h=>h.name.toLowerCase()===n.toLowerCase())?.value || "";
        const fromEmail = mGetH("From");
        const isOut = fromEmail.toLowerCase().includes(gmailUserEmail?.split("@")[0]?.toLowerCase() || "___");
        const sentAt = new Date(parseInt(msg.internalDate)).toISOString();
        const bodyText = extractBody(msg.payload, "text/plain");
        const bodyHtml = extractBody(msg.payload, "text/html");

        const existingMsg = await supaFetch(`/messages?gmail_message_id=eq.${msg.id}&select=id`);
        if (!existingMsg?.length) {
          await supaFetch("/messages", {
            method: "POST",
            body: JSON.stringify({
              conversation_id: conv.id,
              gmail_message_id: msg.id,
              direction: isOut ? "outbound" : "inbound",
              from_email: fromEmail,
              subject: mGetH("Subject"),
              body_text: bodyText,
              body_html: bodyHtml,
              sent_at: sentAt,
            }),
          });
        }
      } catch(e) { console.error("Msg upsert error:", e); }
    }
    synced.push(conv);
  }
  return synced;
};

const getSnippet = (msg) => {
  const text = extractBody(msg.payload, "text/plain");
  return (text || "").slice(0, 120).replace(/\s+/g, " ").trim();
};

const extractBody = (payload, mimeType) => {
  if (!payload) return "";
  if (payload.mimeType === mimeType && payload.body?.data) {
    try { return decodeURIComponent(escape(atob(payload.body.data.replace(/-/g,"+").replace(/_/g,"/")))); } catch(e) { return ""; }
  }
  if (payload.parts) {
    for (const part of payload.parts) {
      const result = extractBody(part, mimeType);
      if (result) return result;
    }
  }
  return "";
};

// ── Gmail Context (shared token state across components)
const GmailContext = React.createContext({ connected: false, userEmail: null, token: null, connect: ()=>{}, disconnect: ()=>{} });

const GmailProvider = ({ children }) => {
  const [connected, setConnected] = useState(false);
  const [userEmail, setUserEmail] = useState(() => localStorage.getItem("gmail_email") || null);
  const [token, setToken] = useState(null);

  const connect = () => {
    if (!window.google) { alert("Google Identity Services not loaded yet. Wait a moment and try again."); return; }
    if (GMAIL_CLIENT_ID === "YOUR_GOOGLE_CLIENT_ID") {
      alert("Gmail Client ID not configured yet. Complete the Google Cloud setup and paste your Client ID into the HTML file."); return;
    }
    gmailTokenClient = window.google.accounts.oauth2.initTokenClient({
      client_id: GMAIL_CLIENT_ID,
      scope: GMAIL_SCOPES,
      callback: async (response) => {
        if (response.error) { alert("Gmail auth failed: " + response.error); return; }
        gmailAccessToken = response.access_token;
        // Get user email
        try {
          const profile = await gmailFetch("/users/me/profile");
          gmailUserEmail = profile.emailAddress;
          setUserEmail(profile.emailAddress);
          localStorage.setItem("gmail_email", profile.emailAddress);
        } catch(e) {}
        setToken(response.access_token);
        setConnected(true);
        localStorage.setItem("gmail_connected", "1");
      },
    });
    gmailTokenClient.requestAccessToken();
  };

  const disconnect = () => {
    if (gmailAccessToken) {
      window.google?.accounts.oauth2.revoke(gmailAccessToken, () => {});
    }
    gmailAccessToken = null;
    gmailUserEmail = null;
    setConnected(false);
    setToken(null);
    setUserEmail(null);
    localStorage.removeItem("gmail_connected");
    localStorage.removeItem("gmail_email");
  };

  // Auto-reconnect silently if previously connected
  useEffect(() => {
    if (connected && !token && GMAIL_CLIENT_ID !== "YOUR_GOOGLE_CLIENT_ID" && window.google) {
      connect();
    }
  }, []);

  return (
    <GmailContext.Provider value={{ connected, userEmail, token, connect, disconnect }}>
      {children}
    </GmailContext.Provider>
  );
};

      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div className="edit-section">

            <EField label="Last Name" field="last_name" form={form} onChange={setField} placeholder="Last name"/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

            <EField label="Company" field="company" form={form} onChange={setField} placeholder="Company name"/>
          </div>
        </div>
        <div className="edit-section">
          <div className="edit-section-title">Phone Numbers</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <EPhoneField label="Cell Phone" field="cell" form={form} onChange={setField}/>

// ── Column definitions
const ALL_COLUMNS = [
  { key:"name",          label:"Name",          always:true },
  { key:"email",         label:"Email",         always:false },
  { key:"cell",          label:"Cell Phone",    always:false },
  { key:"bucket",        label:"Bucket",        always:false },
  { key:"status",        label:"Status",        always:false },
  { key:"last_activity", label:"Last Activity", always:false },
  { key:"tags",          label:"Tags",          always:false },
];
const DEFAULT_VISIBLE = ["name","email","cell","bucket","status","last_activity","tags"];

// ── Contacts Table
const ContactsTable = ({ contacts, onSelect, onNew, onBulkSend }) => {
  const [search, setSearch] = useState("");
  const [showColSettings, setShowColSettings] = useState(false);
  const [colOrder, setColOrder] = useState(() => {
    try { const s = localStorage.getItem("us_col_order"); return s ? JSON.parse(s) : ALL_COLUMNS.map(c=>c.key); } catch { return ALL_COLUMNS.map(c=>c.key); }
  });
  const [visibleCols, setVisibleCols] = useState(() => {
    try { const s = localStorage.getItem("us_cols"); return s ? JSON.parse(s) : DEFAULT_VISIBLE; } catch { return DEFAULT_VISIBLE; }
  });
  const settingsRef = useRef(null);
  const dragKey = useRef(null);
  const dragOverKey = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (settingsRef.current && !settingsRef.current.contains(e.target)) setShowColSettings(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const toggleCol = (key) => {
    const next = visibleCols.includes(key) ? visibleCols.filter(k=>k!==key) : [...visibleCols, key];
    setVisibleCols(next);
    try { localStorage.setItem("us_cols", JSON.stringify(next)); } catch {}
  };

  const onDragStart = (key) => { dragKey.current = key; };
  const onDragOver = (e, key) => { e.preventDefault(); dragOverKey.current = key; };
  const onDrop = () => {
    if (!dragKey.current || dragKey.current === dragOverKey.current) return;
    const next = [...colOrder];
    const from = next.indexOf(dragKey.current);
    const to = next.indexOf(dragOverKey.current);
    next.splice(from, 1);
    next.splice(to, 0, dragKey.current);
    setColOrder(next);
    try { localStorage.setItem("us_col_order", JSON.stringify(next)); } catch {}
    dragKey.current = null; dragOverKey.current = null;
  };

  const [sortKey, setSortKey] = useState("name");
  const [sortDir, setSortDir] = useState("asc");
  const [showFilters, setShowFilters] = useState(false);
  const [filterBuckets, setFilterBuckets] = useState([]);
  const [filterTags, setFilterTags] = useState([]);
  const [filterStatus, setFilterStatus] = useState([]);
  const filterRef = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (filterRef.current && !filterRef.current.contains(e.target)) setShowFilters(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const handleSort = (key) => {
    if (key === "tags") return;
    if (sortKey === key) { setSortDir(d => d === "asc" ? "desc" : "asc"); }
    else { setSortKey(key); setSortDir("asc"); }
  };

  const getSortVal = (c, key) => {
    switch(key) {
      case "name": return ([c.first_name,c.last_name].filter(Boolean).join(" ")||c.name||"").toLowerCase();
      case "email": return (c.email||"").toLowerCase();
      case "cell": return (c.cell||c.mobile||c.cell_phone||"").replace(/\D/g,"");
      case "bucket": return ((c.contact_buckets||[]).map(cb=>cb.buckets?.name).filter(Boolean).join(",")).toLowerCase();
      case "status": return (c.subscription_status||c.subscribed||c.sub_status||"").toLowerCase();
      case "last_activity": return c.last_activity_date||c.last_activity||c.last_active||"";
      default: return "";
    }
  };

  // Derive available tag names from contacts
  const allTagNames = [...new Set(contacts.flatMap(c => (c.contact_tags||[]).map(ct => ct.tags?.name).filter(Boolean)))].sort();
  const allBucketNames = [...new Set(contacts.flatMap(c => (c.contact_buckets||[]).map(cb => cb.buckets?.name).filter(Boolean)))].sort();
  const allStatuses = [...new Set(contacts.map(c => c.subscription_status||c.subscribed||c.sub_status).filter(Boolean))].sort();

  const toggleFilter = (arr, setArr, val) => setArr(prev => prev.includes(val) ? prev.filter(v=>v!==val) : [...prev, val]);
  const clearAllFilters = () => { setFilterBuckets([]); setFilterTags([]); setFilterStatus([]); };
  const activeFilterCount = filterBuckets.length + filterTags.length + filterStatus.length;

  // ── Bulk selection
  const [selectedIds, setSelectedIds] = useState([]);
  const [bulkAction, setBulkAction] = useState(null);
  const [bulkWorking, setBulkWorking] = useState(false);
  const [bulkTagIds, setBulkTagIds] = useState([]);
  const [bulkBuckets, setBulkBuckets] = useState([]);
  const [allTags, setAllTags] = useState([]);
  const [allBucketsForBulk, setAllBucketsForBulk] = useState([]);

  useEffect(() => {
    supaFetch("/tags?order=name.asc").then(t => setAllTags(t||[])).catch(()=>{});
    supaFetch("/buckets?order=name.asc").then(b => setAllBucketsForBulk(b||[])).catch(()=>{});
  }, []);

  const toggleSelect = (e, id) => {
    e.stopPropagation();
    setSelectedIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  };
  const toggleSelectAll = () => {
    const allIds = filtered.map(c=>c.id);
    const allChecked = allIds.length > 0 && allIds.every(id=>selectedIds.includes(id));
    setSelectedIds(allChecked ? [] : allIds);
  };
  const clearSelection = () => { setSelectedIds([]); setBulkAction(null); };

  const handleBulkTags = async () => {
    if (bulkTagIds.length === 0) return;
    setBulkWorking(true);
    try {
      await Promise.all(selectedIds.flatMap(contactId =>
        bulkTagIds.map(tagId =>
          supaFetch("/contact_tags", { method:"POST", body:JSON.stringify({ contact_id:contactId, tag_id:tagId }) })
            .catch(()=>{})
        )
      ));
      setBulkAction(null); setBulkTagIds([]); clearSelection();
      window.__bulkRefresh && window.__bulkRefresh();
    } catch(e) { alert("Bulk tag failed: "+e.message); }
    setBulkWorking(false);
  };

  const handleBulkBuckets = async () => {
    if (bulkBuckets.length === 0) return;
    setBulkWorking(true);
    try {
      await Promise.all(selectedIds.flatMap(contactId =>
        bulkBuckets.map(bucketId =>
          supaFetch("/contact_buckets", { method:"POST", body:JSON.stringify({ contact_id:contactId, bucket_id:bucketId }) })
            .catch(()=>{})
        )
      ));
      setBulkAction(null); setBulkBuckets([]); clearSelection();
      window.__bulkRefresh && window.__bulkRefresh();
    } catch(e) { alert("Bulk bucket failed: "+e.message); }
    setBulkWorking(false);
  };

  const handleBulkDelete = async () => {
    setBulkWorking(true);
    try {
      await Promise.all(selectedIds.map(id =>
        supaFetch(`/contacts?id=eq.${id}`, { method:"DELETE", headers:{ Prefer:"" } })
      ));
      setBulkAction(null); clearSelection();
      window.__bulkRefresh && window.__bulkRefresh();
    } catch(e) { alert("Bulk delete failed: "+e.message); }
    setBulkWorking(false);
  };

  const filtered = contacts.filter(c => {
    const q = search.toLowerCase();
    const name = [c.first_name,c.last_name,c.name,c.full_name].filter(Boolean).join(" ").toLowerCase();
    if (!(name.includes(q)||(c.email||"").toLowerCase().includes(q)||(c.contact_buckets||[]).some(cb=>(cb.buckets?.name||"").toLowerCase().includes(q))||(c.cell||c.mobile||"").includes(q))) return false;
    if (filterBuckets.length > 0) {
      const cBucketNames = (c.contact_buckets||[]).map(cb=>cb.buckets?.name).filter(Boolean);
      if (!filterBuckets.every(b => cBucketNames.includes(b))) return false;
    }
    if (filterTags.length > 0) {
      const cTagNames = (c.contact_tags||[]).map(ct=>ct.tags?.name).filter(Boolean);
      if (!filterTags.every(t => cTagNames.includes(t))) return false;
    }
    if (filterStatus.length > 0) {
      const cStatus = String(c.subscription_status||c.subscribed||c.sub_status||"").toLowerCase();
      if (!filterStatus.includes(cStatus)) return false;
    }
    return true;
  }).sort((a, b) => {
    const av = getSortVal(a, sortKey);
    const bv = getSortVal(b, sortKey);
    const cmp = av < bv ? -1 : av > bv ? 1 : 0;
    return sortDir === "asc" ? cmp : -cmp;
  });

  const allSelected = filtered.length > 0 && filtered.every(c=>selectedIds.includes(c.id));
  const someSelected = selectedIds.length > 0;

  const orderedCols = colOrder.map(k => ALL_COLUMNS.find(c=>c.key===k)).filter(Boolean);
  const visibleOrdered = orderedCols.filter(c => visibleCols.includes(c.key));

  const renderCell = (c, key) => {
    const name = [c.first_name,c.last_name].filter(Boolean).join(" ")||c.name||c.full_name||"—";
    const subStatus = c.subscription_status||c.subscribed||c.sub_status;
    const color = subColor(subStatus);
    switch(key) {
      case "name": return <td key={key} style={{fontWeight:700,fontSize:15,color:C.text}}>{name}</td>;
      case "email": return <td key={key} className="us-mono" style={{fontSize:13,color:C.textSub}}>{c.email||"—"}</td>;
      case "cell": return <td key={key} className="us-mono" style={{fontSize:13,color:C.text}}>{fmt.phone(c.cell||c.mobile||c.cell_phone)}</td>;
      case "bucket": return <td key={key}><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{(c.contact_buckets||[]).length>0?(c.contact_buckets||[]).map(cb=>cb.buckets?<span key={cb.bucket_id} className="us-tag">{cb.buckets.name}</span>:null):<span style={{color:C.textMuted}}>—</span>}</div></td>;
      case "status": return <td key={key}><span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:6,height:6,borderRadius:"50%",background:color,display:"inline-block",flexShrink:0}}/><span className="us-mono" style={{fontSize:11,color,letterSpacing:"0.06em"}}>{subStatus!=null?String(subStatus).toUpperCase():"—"}</span></span></td>;
      case "last_activity": return <td key={key} className="us-mono" style={{fontSize:13,color:C.textSub}}>{fmt.date(c.last_activity_date||c.last_activity||c.last_active)}</td>;
      case "tags": return <td key={key}><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{(c.contact_tags||[]).map(ct=>ct.tags?<span key={ct.tag_id} className="us-tag-pill" style={{fontSize:10,padding:"2px 7px"}}>{ct.tags.name}</span>:null)}{(!c.contact_tags||c.contact_tags.length===0)&&<span style={{color:C.textMuted,fontSize:12}}>—</span>}</div></td>;
      default: return null;
    }
  };

  return (
    <div style={{padding:"32px 24px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:12,flexWrap:"wrap"}}>
        <div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.2em",color:C.accent,textTransform:"uppercase",marginBottom:6}}>Urban Street / CRM</div>
          <h1 style={{fontSize:36,fontWeight:900,lineHeight:1,letterSpacing:"-0.02em",color:C.text}}>CONTACTS</h1>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
          <div className="us-mono" style={{fontSize:12,color:C.textMuted}}>{filtered.length} / {contacts.length}</div>
          {/* Filter button */}
          <div style={{position:"relative"}} ref={filterRef}>
            <button className="us-btn" onClick={()=>setShowFilters(v=>!v)} style={{padding:"8px 12px",fontSize:12,borderColor: activeFilterCount>0?C.accent:"#252525",color: activeFilterCount>0?C.accent:"#888"}}>
              ⊟ FILTER{activeFilterCount>0?` (${activeFilterCount})`:""}
            </button>
            {showFilters && (
              <div className="us-settings-panel" style={{minWidth:280}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.16em",color:C.accent,textTransform:"uppercase"}}>Filters</div>
                  {activeFilterCount>0 && <span onClick={clearAllFilters} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.red,cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase"}}>Clear all</span>}
                </div>
                {/* Bucket filter */}
                {allBucketNames.length > 0 && (
                <div style={{marginBottom:14}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Bucket</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {allBucketNames.map(b=>(
                      <span key={b} onClick={()=>toggleFilter(filterBuckets,setFilterBuckets,b)}
                        style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterBuckets.includes(b)?C.accent:"#333"}`,background:filterBuckets.includes(b)?"rgba(232,255,71,0.1)":"transparent",color:filterBuckets.includes(b)?C.accent:"#888",transition:"all .12s"}}>
                        {filterBuckets.includes(b)?"✓ ":""}{b}
                      </span>
                    ))}
                  </div>
                </div>
                )}
                {/* Tag filter */}
                {allTagNames.length > 0 && (
                  <div style={{marginBottom:14}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Tag</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {allTagNames.map(t=>(
                        <span key={t} onClick={()=>toggleFilter(filterTags,setFilterTags,t)}
                          style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterTags.includes(t)?C.accent:"#333"}`,background:filterTags.includes(t)?"rgba(232,255,71,0.1)":"transparent",color:filterTags.includes(t)?C.accent:"#888",transition:"all .12s"}}>
                          {filterTags.includes(t)?"✓ ":""}{t}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
                {/* Status filter */}
                {allStatuses.length > 0 && (
                  <div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Status</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {allStatuses.map(s=>(
                        <span key={s} onClick={()=>toggleFilter(filterStatus,setFilterStatus,s)}
                          style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterStatus.includes(s)?C.accent:"#333"}`,background:filterStatus.includes(s)?"rgba(232,255,71,0.1)":"transparent",color:filterStatus.includes(s)?C.accent:"#888",transition:"all .12s"}}>

                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
          <div style={{position:"relative"}} ref={settingsRef}>
            <button className="us-btn" onClick={()=>setShowColSettings(v=>!v)} style={{padding:"8px 12px",fontSize:12}}>⚙ COLUMNS</button>

                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,marginBottom:12}}>Toggle · Drag to reorder</div>
                {orderedCols.map(col=>(

                    key={col.key}

                    draggable={!col.always}

                    onDragOver={e=>onDragOver(e,col.key)}

          </div>
          <button className="us-btn us-edit-contact-btn" onClick={onNew} style={{whiteSpace:"nowrap"}}>+ NEW CONTACT</button>

        </div>
      </div>
      {/* Active filter pills */}
      {activeFilterCount > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16,alignItems:"center"}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.1em",textTransform:"uppercase",marginRight:2}}>Filters:</span>

            <span key={b} className="us-tag-pill" style={{fontSize:11}} onClick={()=>toggleFilter(filterBuckets,setFilterBuckets,b)}>

            <span key={t} className="us-tag-pill" style={{fontSize:11}} onClick={()=>toggleFilter(filterTags,setFilterTags,t)}>

          {filterStatus.map(s=>(

      {/* Bulk action bar */}
      {someSelected && (

          <button className="us-btn us-delete-btn" onClick={()=>setBulkAction('delete')} style={{padding:"6px 12px",fontSize:12}}>✕ DELETE</button>
          <button className="us-btn us-save-btn" onClick={()=>onBulkSend&&onBulkSend(contacts.filter(c=>selectedIds.includes(c.id)))} style={{padding:"6px 12px",fontSize:12}}>✉ {selectedIds.length===1?"SEND EMAIL":"BULK SEND"}</button>
          <button className="us-btn" onClick={clearSelection} style={{padding:"6px 12px",fontSize:12,marginLeft:"auto"}}>CANCEL</button>

      )}
      <div className="us-table-wrap">
        <table className="us-table">
          <thead>
            <tr>
              <th style={{width:36,padding:"10px 8px 10px 12px"}} onClick={toggleSelectAll}>
                <div style={{width:16,height:16,border:`1.5px solid ${allSelected?C.accent:"#444"}`,borderRadius:2,background:allSelected?C.accent:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {allSelected && <span style={{color:"#000",fontSize:10,fontWeight:900,lineHeight:1}}>✓</span>}
                  {!allSelected && selectedIds.length>0 && <span style={{color:C.accent,fontSize:10,lineHeight:1}}>—</span>}
                </div>
              </th>
              {visibleOrdered.map(col => {
                const sortable = col.key !== "tags";
                const active = sortKey === col.key;
                return (
                  <th key={col.key}
                    onClick={() => sortable && handleSort(col.key)}
                    style={{cursor: sortable ? "pointer" : "default", userSelect:"none", whiteSpace:"nowrap"}}
                  >
                    <span style={{display:"inline-flex",alignItems:"center",gap:5}}>
                      {col.label}
                      {sortable && (
                        <span style={{fontSize:8,opacity: active ? 1 : 0.3, color: active ? C.accent : C.textSub, lineHeight:1}}>
                          {active ? (sortDir === "asc" ? "▲" : "▼") : "⬍"}
                        </span>
                      )}
                    </span>
                  </th>
                );
              })}
              <th style={{width:32}}/>
            </tr>
          </thead>
          <tbody>
            {filtered.map(c => {
              const isChecked = selectedIds.includes(c.id);
              return (
                <tr key={c.id} onClick={()=>onSelect(c)} style={{background: isChecked?"rgba(232,255,71,0.04)":""}}>
                  <td style={{padding:"10px 8px 10px 12px"}} onClick={e=>toggleSelect(e,c.id)}>
                    <div style={{width:16,height:16,border:`1.5px solid ${isChecked?C.accent:"#444"}`,borderRadius:2,background:isChecked?C.accent:"transparent",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {isChecked && <span style={{color:"#000",fontSize:10,fontWeight:900,lineHeight:1}}>✓</span>}
                    </div>
                  </td>
                  {visibleOrdered.map(col=>renderCell(c, col.key))}
                  <td><span className="us-row-arrow" style={{fontSize:14}}>→</span></td>
                </tr>
              );
            })}
            {filtered.length===0&&(
              <tr><td colSpan={visibleOrdered.length+2} style={{textAlign:"center",padding:40,color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>NO CONTACTS FOUND</td></tr>
            )}
          </tbody>
        </table>
      </div>

      {/* Bulk Tag Modal */}
      {bulkAction==='tag' && (
        <div className="us-modal-overlay">
          <div className="us-modal" style={{maxWidth:480,textAlign:"left"}}>
            <div style={{fontSize:16,fontWeight:700,color:C.accent,marginBottom:4,letterSpacing:"0.04em"}}>ASSIGN TAGS</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted,marginBottom:20}}>Applies to {selectedIds.length} contact{selectedIds.length!==1?"s":""}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:24}}>
              {allTags.map(t => bulkTagIds.includes(t.id) ? (
                <span key={t.id} className="us-tag-pill" onClick={()=>setBulkTagIds(p=>p.filter(i=>i!==t.id))} style={{cursor:"pointer"}}>
                  {t.name} <span className="us-tag-pill-remove">×</span>
                </span>
              ) : (
                <span key={t.id} className="us-tag-available" onClick={()=>setBulkTagIds(p=>[...p,t.id])}>+ {t.name}</span>
              ))}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="us-btn" onClick={()=>{setBulkAction(null);setBulkTagIds([]);}} disabled={bulkWorking}>CANCEL</button>
              <button className="us-btn us-save-btn" onClick={handleBulkTags} disabled={bulkWorking||bulkTagIds.length===0}>
                {bulkWorking?"SAVING…":"✓ APPLY TAGS"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Bulk Bucket Modal */}
      {bulkAction==='bucket' && (
        <div className="us-modal-overlay">
          <div className="us-modal" style={{maxWidth:480,textAlign:"left"}}>
            <div style={{fontSize:16,fontWeight:700,color:C.accent,marginBottom:4,letterSpacing:"0.04em"}}>ASSIGN BUCKETS</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted,marginBottom:20}}>Adds buckets to {selectedIds.length} contact{selectedIds.length!==1?"s":""}</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:7,marginBottom:24}}>
              {allTags.length === 0 && <div style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>Loading…</div>}
              {allBucketsForBulk.map(b => bulkBuckets.includes(b.id) ? (
                <span key={b.id} className="us-tag-pill" onClick={()=>setBulkBuckets(p=>p.filter(x=>x!==b.id))} style={{cursor:"pointer"}}>
                  {b.name} <span className="us-tag-pill-remove">×</span>
                </span>
              ) : (
                <span key={b.id} className="us-tag-available" onClick={()=>setBulkBuckets(p=>[...p,b.id])}>+ {b.name}</span>
              ))}
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button className="us-btn" onClick={()=>{setBulkAction(null);setBulkBuckets([]);}} disabled={bulkWorking}>CANCEL</button>
              <button className="us-btn us-save-btn" onClick={handleBulkBuckets} disabled={bulkWorking||bulkBuckets.length===0}>
                {bulkWorking?"SAVING…":"✓ APPLY BUCKETS"}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Bulk Delete Modal */}
      {bulkAction==='delete' && (
        <div className="us-modal-overlay">
          <div className="us-modal">
            <div style={{fontSize:18,fontWeight:700,color:C.red,marginBottom:8,letterSpacing:"0.02em"}}>DELETE CONTACTS</div>
            <div style={{fontSize:15,color:C.textSub,marginBottom:24,lineHeight:1.5}}>
              Permanently delete <span style={{color:C.text,fontWeight:700}}>{selectedIds.length} contact{selectedIds.length!==1?"s":""}</span>? This cannot be undone.
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="us-btn" onClick={()=>setBulkAction(null)} disabled={bulkWorking}>CANCEL</button>
              <button className="us-btn us-delete-btn" onClick={handleBulkDelete} disabled={bulkWorking} style={{background:"rgba(255,68,68,.1)"}}>
                {bulkWorking?"DELETING…":`✕ DELETE ${selectedIds.length}`}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

const EMPTY_SIG = { name:"", style:"Urban Street", full_name:"", title:"", company:"", email:"", phone:"", website:"", tagline:"", accent_color:"#e8622a", show_logo:false, is_default:false };

    ${s.website?`<a href="${s.website}" style="color:${color};text-decoration:none;display:inline-flex;align-items:center;gap:6px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> ${s.website.replace(/^https?:\/\//,"")}</a><br/>`:""}

</table>`;

const SigField = ({label, field, placeholder, type="text", form, set}) => (
  <div style={{display:"flex",flexDirection:"column",gap:5}}>
    <div className="us-section-label">{label}</div>
    <input className="us-input" type={type} value={form[field]||""} onChange={e=>set(field,e.target.value)} placeholder={placeholder||""}/>
  </div>
);

const SignatureForm = ({ sig, onSave, onCancel }) => {
  const [form, setForm] = useState(sig || {...EMPTY_SIG});
  const [saving, setSaving] = useState(false);
  const [preview, setPreview] = useState(false);
  const set = (f,v) => setForm(p=>({...p,[f]:v}));

  const handleSave = async () => {
    if (!form.name.trim()) { alert("Signature name is required."); return; }
    setSaving(true);
    try {
      const payload = {...form, html_output: buildSigHtml(form)};
      let result;
      if (sig?.id) {
        result = await supaFetch(`/signatures?id=eq.${sig.id}`, { method:"PATCH", body:JSON.stringify(payload) });
        result = Array.isArray(result) ? result[0] : (result || {...payload, id:sig.id});
      } else {
        result = await supaFetch("/signatures", { method:"POST", body:JSON.stringify(payload) });
        result = Array.isArray(result) ? result[0] : result;
      }
      onSave(result);
    } catch(e) { alert("Failed: "+e.message); }
    setSaving(false);
  };

  return (
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:24,marginBottom:16}}>
