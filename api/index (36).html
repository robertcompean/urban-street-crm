const isSuppressed = (c, engagementDays) => {
  const status = String(c.email_status||"").toLowerCase();
  if (status === "bounced" || status === "complained" || status === "unsubscribed") return true;
  if (engagementDays && c.last_activity_date) {
    const cutoff = new Date();
    cutoff.setDate(cutoff.getDate() - engagementDays);
    if (new Date(c.last_activity_date) >= cutoff) return true;
  }
  return false;
};

const BulkSendsPage = ({ allContacts, preselectedContacts }) => {
  const [step, setStep] = useState(0);
  const [templates, setTemplates] = useState([]);
  const [signatures, setSignatures] = useState([]);
  const [loading, setLoading] = useState(true);
  const [engSuppression] = useState(() => getEngagementSuppression());
  const engDays = engSuppression.enabled ? engSuppression.days : null;

  // Step 0 — template or compose or html blast
  const [mode, setMode] = useState("template"); // "template" | "compose" | "blast"
  const [selTmpl, setSelTmpl] = useState(null);
  const [previewCid, setPreviewCid] = useState(() => preselectedContacts?.[0]?.id || null);
  const [showPreview, setShowPreview] = useState(false);
  const [composeSubject, setComposeSubject] = useState("");
  const [composeBody, setComposeBody] = useState("");
  const [composeSigId, setComposeSigId] = useState("");
  const [blastSubject, setBlastSubject] = useState("");
  const [blastHtml, setBlastHtml] = useState("");
  const [blastFromName, setBlastFromName] = useState("Urban Street Ventures");

  // Step 1 — filters
  const [search, setSearch] = useState("");
  const [selTags, setSelTags] = useState([]);
  const [selBuckets, setSelBuckets] = useState([]);
  const [exclBuckets, setExclBuckets] = useState([]);

  // Step 2 — recipients locked in
  const [recipients, setRecipients] = useState([]);

  // Step 3 — send
  const [rate, setRate] = useState(10);
  const [queue, setQueue] = useState([]);
  const [sendState, setSendState] = useState("idle"); // idle|running|paused|done
  const [curIdx, setCurIdx] = useState(0);
  const [log, setLog] = useState([]);
  const intervalRef = useRef(null);

  // Scheduling
  const [scheduleMode, setScheduleMode] = useState("now"); // "now" | "scheduled"
  const [schedName, setSchedName] = useState("");
  const [schedStart, setSchedStart] = useState("");
  const [schedEnd, setSchedEnd] = useState("");
  const [schedDailyLimit, setSchedDailyLimit] = useState(50);
  const [schedWindowStart, setSchedWindowStart] = useState("09:00");
  const [schedWindowEnd, setSchedWindowEnd] = useState("17:00");
  const [schedDays, setSchedDays] = useState(["Mon","Tue","Wed","Thu","Fri"]);
  const [schedSaving, setSchedSaving] = useState(false);
  const [schedSaved, setSchedSaved] = useState(false);

  useEffect(() => {
    Promise.all([
      supaFetch("/templates?brand=eq.Urban Street&order=name.asc"),
      supaFetch("/signatures?order=name.asc"),
    ]).then(([t, s]) => {
      setTemplates(t||[]);
      setSignatures(s||[]);
      setLoading(false);
    }).catch(e => { console.error(e); setLoading(false); });
  }, []);

  useEffect(() => () => clearInterval(intervalRef.current), []);

  // Derived
  const allTagNames = [...new Set((allContacts||[]).flatMap(c => {
    const tags = c.contact_tags||[];
    return tags.map(ct => ct.tags?.name).filter(Boolean);
  }))].sort();

  const allBucketNames = [...new Set((allContacts||[]).flatMap(c => {
    const buckets = c.contact_buckets||[];
    return buckets.map(cb => cb.buckets?.name).filter(Boolean);
  }))].sort();

  const filtered = (allContacts||[]).filter(c => {
    if (!c.email) return false;
    if (isSuppressed(c, engDays)) return false;
    const q = search.toLowerCase();
    const nameMatch = !q || `${c.first_name||""} ${c.last_name||""} ${c.email||""} ${c.company||""}`.toLowerCase().includes(q);
    const contactTagNames = (c.contact_tags||[]).map(ct=>ct.tags?.name).filter(Boolean);
    const contactBucketNames = (c.contact_buckets||[]).map(cb=>cb.buckets?.name).filter(Boolean);
    const tagMatch = selTags.length===0 || selTags.every(t=>contactTagNames.includes(t));
    const bucketMatch = selBuckets.length===0 || selBuckets.some(b=>contactBucketNames.includes(b));
    const bucketExclude = exclBuckets.length>0 && exclBuckets.some(b=>contactBucketNames.includes(b));
    return nameMatch && tagMatch && bucketMatch && !bucketExclude;
  });

  const engSuppressionCount = engDays
    ? (allContacts||[]).filter(c => c.email && !isSuppressed(c) && c.last_activity_date && (() => {
        const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - engDays);
        return new Date(c.last_activity_date) >= cutoff;
      })()).length
    : 0;

  // When launched from table, skip the filter step
  useEffect(() => {
    if (preselectedContacts) {
      setRecipients(preselectedContacts);
      setQueue(preselectedContacts.map(c=>({...c,_status:"queued"})));
    }
  }, [preselectedContacts]);

  const goNext = () => {
    if (step===1) {
      setRecipients(filtered);
      setQueue(filtered.map(c=>({...c, _status:"queued"})));
    }
    // skip filter step (step 1) if recipients are pre-loaded from table
    const nextStep = (preselectedContacts && step===0) ? 2 : step+1;
    setStep(nextStep);
  };
  const goBack = () => {
    // skip filter step going back too
    const prevStep = (preselectedContacts && step===2) ? 0 : step-1;
    setStep(prevStep);
  };

  // Send engine
  const msPerSend = Math.round(60000/rate);
  const sentCount = queue.filter(q=>q._status==="sent").length;
  const failCount = queue.filter(q=>q._status==="failed").length;
  const progress = queue.length>0 ? Math.round((sentCount+failCount)/queue.length*100) : 0;

  const { connected: gmailConnected } = React.useContext(GmailContext);

  const getEmailContent = (contact) => {
    const subject = applyMerge(mode==="compose" ? composeSubject : (selTmpl?.subject || selTmpl?.name || ""), contact);
    const rawBody = mode==="compose" ? composeBody : (selTmpl?.body || "");
    const body = applyMerge(rawBody, contact);
    const sigObj = mode==="compose"
      ? signatures.find(s=>s.id===composeSigId)
      : selTmpl ? signatures.find(s=>s.id===selTmpl.signature_id) : null;
    const sigHtml = sigObj?.html_output || "";
    return { subject, body, sigHtml };
  };

  const saveScheduledSend = async () => {
    if (!schedName.trim()) { alert("Give this scheduled send a name."); return; }
    if (!schedStart) { alert("Set a start date."); return; }
    if (!schedDays.length) { alert("Select at least one send day."); return; }
    setSchedSaving(true);
    try {
      const config = mode === "template"
        ? { template_id: selTmpl?.id, template_name: selTmpl?.name }
        : mode === "compose"
          ? { subject: composeSubject, body: composeBody, sig_id: composeSigId }
          : { subject: blastSubject, html: blastHtml, from_name: blastFromName };
      await supaFetch("/scheduled_sends", {
        method: "POST",
        body: JSON.stringify({
          name: schedName.trim(),
          mode,
          config,
          recipient_ids: recipients.map(c => c.id),
          schedule: {
            start_date: schedStart,
            daily_limit: schedDailyLimit,
            window_start: schedWindowStart,
            window_end: schedWindowEnd,
            send_days: schedDays,
            timezone: "America/Los_Angeles",
          },
          status: "scheduled",
          sends_completed: 0,
          next_send_at: schedStart ? new Date(`${schedStart}T${schedWindowStart}:00`).toISOString() : null,
        }),
      });
      setSchedSaved(true);
    } catch(e) { alert("Failed to save: " + e.message); }
    setSchedSaving(false);
  };

  const runSend = () => {
    if (mode === "blast") {
      runBlastSend();
    } else if (gmailConnected) {
      runRealSend();
    } else {
      runSimulation();
    }
  };

  const runBlastSend = () => {
    setSendState("running");
    let idx = 0;
    const sendNext = async () => {
      if (idx >= queue.length) { setSendState("done"); return; }
      const contact = queue[idx];
      const currentIdx = idx;
      idx++;
      setCurIdx(idx);
      setQueue(prev => { const q=[...prev]; q[currentIdx]={...q[currentIdx],_status:"sending"}; return q; });
      try {
        const subject = applyMerge(blastSubject, contact);
        const html = applyMerge(blastHtml, contact) + UNSUB_FOOTER_HTML(contact.id);
        await resendSend({ to: contact.email, subject, html, fromName: blastFromName });
        setQueue(prev => { const q=[...prev]; q[currentIdx]={...q[currentIdx],_status:"sent"}; return q; });
      } catch(e) {
        console.error("Resend blast error:", e);
        setQueue(prev => { const q=[...prev]; q[currentIdx]={...q[currentIdx],_status:"failed"}; return q; });
      }
      // Small delay to avoid hammering
      setTimeout(sendNext, 200);
    };
    sendNext();
  };

  const runRealSend = () => {
    setSendState("running");
    let idx = curIdx;
    const sendNext = async () => {
      if (idx >= queue.length) { setSendState("done"); return; }
      const contact = queue[idx];
      const currentIdx = idx;
      idx++;
      setCurIdx(idx);

      setQueue(prev => { const q=[...prev]; q[currentIdx]={...q[currentIdx],_status:"sending"}; return q; });

      try {
        const { subject, body, sigHtml } = getEmailContent(contact);
        await gmailSend({ to: contact.email, subject, body, sigHtml });

        // Log to Supabase conversations/messages
        try {
          let convData = await supaFetch(`/conversations?contact_id=eq.${contact.id}&subject=eq.${encodeURIComponent(subject)}&select=id`);
          let convId;
          if (convData?.length) {
            convId = convData[0].id;
            await supaFetch(`/conversations?id=eq.${convId}`, { method:"PATCH", body: JSON.stringify({ last_message_at: new Date().toISOString(), snippet: body.slice(0,120), last_direction: "outbound" }) });
          } else {
            const res = await supaFetch("/conversations", { method:"POST", body: JSON.stringify({ contact_id: contact.id, subject, snippet: body.slice(0,120), last_message_at: new Date().toISOString(), unread: false, last_direction: "outbound" }) });
            convId = (Array.isArray(res)?res[0]:res)?.id;
          }
          if (convId) {
            await supaFetch("/messages", { method:"POST", body: JSON.stringify({ conversation_id: convId, direction:"outbound", from_email: gmailUserEmail, subject, body_text: body, sent_at: new Date().toISOString() }) });
          }
          // Update last_activity_date
          await supaFetch(`/contacts?id=eq.${contact.id}`, { method:"PATCH", body: JSON.stringify({ last_activity_date: new Date().toISOString().slice(0,10) }) });
        } catch(logErr) { console.warn("Logging error:", logErr); }

        setQueue(prev => { const q=[...prev]; if(q[currentIdx]) q[currentIdx]={...q[currentIdx],_status:"sent"}; return q; });
        setLog(l=>[{name:`${contact.first_name||""} ${contact.last_name||""}`.trim(), email:contact.email, status:"sent", time:new Date().toLocaleTimeString()},...l]);
      } catch(e) {
        setQueue(prev => { const q=[...prev]; if(q[currentIdx]) q[currentIdx]={...q[currentIdx],_status:"failed"}; return q; });
        setLog(l=>[{name:`${contact.first_name||""} ${contact.last_name||""}`.trim(), email:contact.email, status:"failed", time:new Date().toLocaleTimeString()},...l]);
        console.error("Send failed:", e.message);
      }

      if (idx < queue.length) {
        intervalRef.current = setTimeout(sendNext, msPerSend);
      } else {
        setSendState("done");
      }
    };
    sendNext();
  };

  const runSimulation = () => {
    setSendState("running");
    let idx = curIdx;
    intervalRef.current = setInterval(() => {
      if (idx >= queue.length) { clearInterval(intervalRef.current); setSendState("done"); return; }
      const contact = queue[idx];
      setQueue(prev => { const q=[...prev]; q[idx]={...q[idx],_status:"sending"}; return q; });
      setTimeout(() => {
        const ok = Math.random()>0.05;
        const status = ok?"sent":"failed";
        setQueue(prev => { const q=[...prev]; if(q[idx]) q[idx]={...q[idx],_status:status}; return q; });
        setLog(l=>[{name:`${contact.first_name||""} ${contact.last_name||""}`.trim(), email:contact.email, status, time:new Date().toLocaleTimeString()},...l]);
        setCurIdx(idx+1);
        idx++;
        if (idx>=queue.length) { clearInterval(intervalRef.current); setSendState("done"); }
      }, msPerSend*0.75);
      idx++;
      if (idx>queue.length) clearInterval(intervalRef.current);
    }, msPerSend);
  };

  const pauseSend = () => {
    clearInterval(intervalRef.current);
    clearTimeout(intervalRef.current);
    setSendState("paused");
  };
  const resetSend = () => {
    clearInterval(intervalRef.current);
    setSendState("idle"); setCurIdx(0);
    setQueue(recipients.map(c=>({...c,_status:"queued"})));
    setLog([]);
    historySavedRef.current = false;
  };

  // Save completed "Send Now" sends to history
  const historySavedRef = useRef(false);
  useEffect(() => {
    if (sendState !== "done" || scheduleMode !== "now" || historySavedRef.current) return;
    historySavedRef.current = true;
    const sent = queue.filter(q=>q._status==="sent").length;
    const failed = queue.filter(q=>q._status==="failed").length;
    const autoName = mode === "template"
      ? (selTmpl?.name || "Template Send")
      : mode === "blast"
        ? (blastSubject || "HTML Blast")
        : (composeSubject || "Compose Send");
    const config = mode === "template"
      ? { template_id: selTmpl?.id, template_name: selTmpl?.name, sent, failed }
      : mode === "compose"
        ? { subject: composeSubject, sent, failed }
        : { subject: blastSubject, sent, failed };
    supaFetch("/scheduled_sends", {
      method: "POST",
      body: JSON.stringify({
        name: `${autoName} — ${new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}`,
        mode,
        config,
        recipient_ids: recipients.map(c=>c.id),
        schedule: null,
        status: "completed",
        sends_completed: sent,
        next_send_at: null,
      }),
    }).catch(e => console.warn("History save error:", e));
  }, [sendState]);

  const copyEmails = () => navigator.clipboard.writeText(recipients.map(c=>c.email).join(", "));
  const openGmail = () => {
    const to = encodeURIComponent(recipients.map(c=>c.email).join(","));
    const subj = encodeURIComponent(mode==="compose" ? composeSubject : (selTmpl?.subject||selTmpl?.name||""));
    window.open(`https://mail.google.com/mail/?view=cm&to=${to}&su=${subj}`, "_blank");
  };

  const previewContact = (allContacts||[]).find(c=>c.id===previewCid) || allContacts?.[0];
  const sig = mode==="compose"
    ? signatures.find(s=>s.id===composeSigId)
    : selTmpl ? signatures.find(s=>s.id===selTmpl.signature_id) : null;

  const step0Valid = mode==="template" ? !!selTmpl : mode==="blast" ? blastSubject.trim().length>0 && blastHtml.trim().length>0 : composeSubject.trim().length>0 && composeBody.trim().length>0;

  // Step labels
  const STEPS = ["Template","Filter","Review","Send"];
  const StepBar = () => (
    <div style={{display:"flex",alignItems:"center",marginBottom:28}}>
      {STEPS.map((s,i) => {
        const skipped = preselectedContacts && i===1;
        const done = i<step || skipped;
        const active = i===step && !skipped;
        return (
          <React.Fragment key={s}>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
              <div style={{
                width:30,height:30,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",
                background:done?C.accent:"transparent",
                border:`2px solid ${done||active?C.accent:C.border}`,
                color:done?"#fff":active?C.accent:C.textMuted,
                fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,
                opacity:skipped?0.5:1,
              }}>{done?"✓":i+1}</div>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:active?C.accent:done?C.textSub:C.textMuted,opacity:skipped?0.4:1}}>{skipped?"SKIPPED":s}</span>
            </div>
            {i<STEPS.length-1 && <div style={{flex:1,height:1,background:done?C.accent:C.border,margin:"0 8px",marginBottom:18}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );

  const SLabel = ({children}) => (
    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.16em",textTransform:"uppercase",color:C.accent,marginBottom:10}}>{children}</div>
  );

  const NavBtns = ({nextLabel="NEXT →",nextDisabled}) => (
    <div style={{display:"flex",justifyContent:"space-between",marginTop:24,paddingTop:20,borderTop:`1px solid ${C.border}`}}>
      <div>{step>0 && <button className="us-btn" onClick={goBack}>← BACK</button>}</div>
      <button className="us-btn us-save-btn" onClick={goNext} disabled={nextDisabled} style={{opacity:nextDisabled?0.4:1}}>{nextLabel}</button>
    </div>
  );

  const statusStyle = (s) => {
    if (s==="sent")    return {background:"rgba(26,127,60,.1)",color:C.green,border:`1px solid rgba(26,127,60,.3)`};
    if (s==="failed")  return {background:"rgba(204,34,34,.1)",color:C.red,border:`1px solid rgba(204,34,34,.3)`};
    if (s==="sending") return {background:"rgba(232,98,42,.1)",color:C.accent,border:`1px solid rgba(232,98,42,.3)`};
    return {background:C.elevated,color:C.textMuted,border:`1px solid ${C.border}`};
  };
  const StatusBadge = ({s}) => (
    <span style={{...statusStyle(s),display:"inline-block",padding:"2px 8px",borderRadius:2,fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600}}>{s}</span>
  );

  if (loading) return (
    <div className="us-loading"><div className="us-spinner"/>LOADING TEMPLATES</div>
  );

  return (
    <div style={{maxWidth:960,margin:"0 auto",padding:"32px 24px"}}>
      <div style={{marginBottom:28}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.2em",color:C.accent,textTransform:"uppercase",marginBottom:6}}>Urban Street / CRM</div>
        <h1 style={{fontSize:36,fontWeight:900,lineHeight:1,letterSpacing:"-0.02em",color:C.text}}>BULK SENDS</h1>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted,marginTop:4}}>Send a template to a filtered contact list</div>
        {preselectedContacts && (
          <div style={{marginTop:10,display:"inline-flex",alignItems:"center",gap:8,padding:"6px 14px",background:"rgba(232,98,42,.08)",border:`1px solid rgba(232,98,42,.3)`,borderRadius:3}}>
            <span style={{color:C.accent,fontSize:13}}>✓</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.accent,fontWeight:700}}>{preselectedContacts.length} CONTACTS FROM TABLE</span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted}}> — filter step skipped</span>
          </div>
        )}
      </div>

      <StepBar/>

      {/* ── STEP 0: TEMPLATE OR COMPOSE ── */}
      {step===0 && (
        <div>
          {/* Mode toggle */}
          <div style={{display:"flex",gap:2,marginBottom:24,borderBottom:`1px solid ${C.border}`}}>
            {[{key:"template",label:"USE A TEMPLATE"},{key:"compose",label:"COMPOSE"},{key:"blast",label:"HTML BLAST"}].map(({key,label})=>(
              <button key={key} onClick={()=>{setMode(key);setShowPreview(false);}}
                style={{background:"transparent",border:"none",cursor:"pointer",padding:"8px 20px",
                  fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:"0.1em",
                  color:mode===key?C.accent:C.textMuted,
                  borderBottom:`2px solid ${mode===key?C.accent:"transparent"}`,
                  marginBottom:-1,transition:"color .15s"}}>
                {label}
              </button>
            ))}
          </div>

          {/* ── TEMPLATE MODE ── */}
          {mode==="template" && (
            <>
              <SLabel>Choose a Template</SLabel>
              {templates.length===0 ? (
                <div style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:12,padding:"24px 0"}}>No templates found. Create one in Settings → Templates first.</div>
              ) : (
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12,marginBottom:24}}>
                  {templates.map(t=>(
                    <div key={t.id} onClick={()=>{setSelTmpl(t);setShowPreview(false);}}
                      style={{
                        background:selTmpl?.id===t.id?"rgba(232,98,42,.06)":C.surface,
                        border:`2px solid ${selTmpl?.id===t.id?C.accent:C.border}`,
                        borderRadius:4,padding:"16px",cursor:"pointer",transition:"all .15s",
                      }}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                        <span style={{fontSize:15,fontWeight:700,color:C.text}}>{t.name}</span>
                        {selTmpl?.id===t.id && <span style={{color:C.accent,fontSize:14}}>✓</span>}
                      </div>
                      {t.brand && <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:C.accent,marginBottom:4}}>{t.brand}</div>}
                      {t.subject && <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted,marginBottom:8}}>Subj: {t.subject}</div>}
                      <button onClick={e=>{e.stopPropagation();setSelTmpl(t);setShowPreview(true);}}
                        className="us-btn" style={{padding:"4px 10px",fontSize:10,marginTop:4}}>▼ PREVIEW</button>
                    </div>
                  ))}
                </div>
              )}
              {showPreview && selTmpl && (
                <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:20,marginBottom:20}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.16em",textTransform:"uppercase",color:C.accent}}>Template Preview</div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted}}>Preview as:</span>
                      <select className="us-select" value={previewCid||""} onChange={e=>setPreviewCid(e.target.value)}
                        style={{width:"auto",padding:"4px 10px",fontSize:12}}>
                        {(allContacts||[]).slice(0,30).map(c=>(
                          <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>
                        ))}
                      </select>
                      <button className="us-btn" onClick={()=>setShowPreview(false)} style={{padding:"4px 10px",fontSize:10}}>✕ CLOSE</button>
                    </div>
                  </div>
                  {selTmpl.subject && (
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textSub,marginBottom:10,padding:"6px 10px",background:C.elevated,borderRadius:3}}>
                      Subject: {previewContact ? applyMerge(selTmpl.subject, previewContact) : selTmpl.subject}
                    </div>
                  )}
                  <div style={{background:"#fff",borderRadius:3,padding:"14px 16px",color:"#222",fontFamily:"Arial,sans-serif",fontSize:14,lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:280,overflowY:"auto"}}>
                    {previewContact ? applyMerge(selTmpl.body||"", previewContact) : selTmpl.body||""}
                  </div>
                  {sig?.html_output && (
                    <div style={{background:"#fff",borderRadius:3,padding:"10px 16px",marginTop:8}} dangerouslySetInnerHTML={{__html:sig.html_output}}/>
                  )}
                </div>
              )}
            </>
          )}

          {/* ── COMPOSE MODE ── */}
          {mode==="compose" && (
            <div style={{display:"flex",flexDirection:"column",gap:16,maxWidth:680}}>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div className="us-section-label">Subject</div>
                <input className="us-input" placeholder="Email subject…" value={composeSubject}
                  onChange={e=>setComposeSubject(e.target.value)}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div className="us-section-label">Body</div>
                <textarea className="us-textarea" placeholder="Write your email here…" value={composeBody}
                  onChange={e=>setComposeBody(e.target.value)} style={{minHeight:220,resize:"vertical"}}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div className="us-section-label">Signature</div>
                <div style={{position:"relative"}}>
                  <select className="us-select" value={composeSigId} onChange={e=>setComposeSigId(e.target.value)}
                    style={{paddingRight:32}}>
                    <option value="">— No signature —</option>
                    {signatures.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                  <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:"#555",pointerEvents:"none",fontSize:10}}>▼</span>
                </div>
              </div>
              {sig?.html_output && (
                <div>
                  <div className="us-section-label">Signature Preview</div>
                  <div style={{background:"#fff",borderRadius:3,padding:"12px 16px",border:`1px solid ${C.border}`}}
                    dangerouslySetInnerHTML={{__html:sig.html_output}}/>
                </div>
              )}
            </div>
          )}

          {/* ── HTML BLAST MODE ── */}
          {mode==="blast" && (
            <div style={{display:"flex",flexDirection:"column",gap:16,maxWidth:680}}>
              <div style={{background:"rgba(232,98,42,0.06)",border:`1px solid rgba(232,98,42,0.2)`,borderRadius:4,padding:"10px 14px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.accent}}>
                ✦ SENDS VIA RESEND — urbansv.com — NO DAILY LIMIT — IMMEDIATE DELIVERY
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div className="us-section-label">From Name</div>
                <input className="us-input" placeholder="Urban Street Ventures" value={blastFromName}
                  onChange={e=>setBlastFromName(e.target.value)}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div className="us-section-label">Subject</div>
                <input className="us-input" placeholder="Email subject…" value={blastSubject}
                  onChange={e=>setBlastSubject(e.target.value)}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                <div className="us-section-label">HTML Body</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,marginBottom:4}}>Paste your HTML email code here. Use {"{{first_name}}"} for merge fields.</div>
                <textarea className="us-textarea" placeholder={"<html>\n<body>\n  <h1>Hello {{first_name}},</h1>\n  <p>Your message here.</p>\n</body>\n</html>"}
                  value={blastHtml} onChange={e=>setBlastHtml(e.target.value)}
                  style={{minHeight:300,resize:"vertical",fontFamily:"'JetBrains Mono',monospace",fontSize:12}}/>
              </div>
              {blastHtml.trim() && (
                <div>
                  <div className="us-section-label">HTML Preview</div>
                  <div style={{background:"#fff",borderRadius:3,padding:"16px",border:`1px solid ${C.border}`,maxHeight:400,overflowY:"auto"}}
                    dangerouslySetInnerHTML={{__html:blastHtml}}/>
                </div>
              )}
            </div>
          )}

          <NavBtns nextLabel="CHOOSE RECIPIENTS →" nextDisabled={!step0Valid}/>
        </div>
      )}

      {/* ── STEP 1: FILTER ── */}
      {step===1 && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:24}}>
            <div>
              <SLabel>Filter Contacts</SLabel>
              {engDays && engSuppressionCount > 0 && (
                <div style={{background:"rgba(232,98,42,.06)",border:"1px solid rgba(232,98,42,.2)",borderRadius:3,padding:"8px 12px",marginBottom:12,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.accent,letterSpacing:"0.08em"}}>
                  ⚡ {engSuppressionCount} contact{engSuppressionCount!==1?"s":""} suppressed — active within {engDays} days
                </div>
              )}
              <input className="us-search" placeholder="Search name, email, company…" value={search}
                onChange={e=>setSearch(e.target.value)} style={{width:"100%",marginBottom:14}}/>

              {allTagNames.length>0 && (
                <div style={{marginBottom:16}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.textMuted,marginBottom:8}}>Filter by Tag</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {allTagNames.map(t=>(
                      <span key={t} onClick={()=>setSelTags(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t])}
                        className={selTags.includes(t)?"us-tag-pill":"us-tag-available"} style={{cursor:"pointer"}}>
                        {selTags.includes(t)?"✓ "+t:"+ "+t}
                        {selTags.includes(t) && <span className="us-tag-pill-remove" style={{marginLeft:4}}>×</span>}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              {allBucketNames.length>0 && (
                <div style={{marginBottom:16}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.textMuted,marginBottom:8}}>Filter by Bucket</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {allBucketNames.map(b=>(
                      <span key={b} onClick={()=>setSelBuckets(p=>p.includes(b)?p.filter(x=>x!==b):[...p,b])}
                        className={selBuckets.includes(b)?"us-tag-pill":"us-tag-available"} style={{cursor:"pointer"}}>
                        {selBuckets.includes(b)?"✓ "+b:"+ "+b}
                        {selBuckets.includes(b) && <span className="us-tag-pill-remove" style={{marginLeft:4}}>×</span>}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              {allBucketNames.length>0 && (
                <div style={{marginBottom:16}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.red,marginBottom:8}}>Exclude Bucket</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {allBucketNames.map(b=>(
                      <span key={b} onClick={()=>setExclBuckets(p=>p.includes(b)?p.filter(x=>x!==b):[...p,b])}
                        style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:12,fontSize:12,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.04em",cursor:"pointer",
                          border:`1px solid ${exclBuckets.includes(b)?"#cc2222":"#d0d0d5"}`,
                          background:exclBuckets.includes(b)?"rgba(204,34,34,0.08)":"transparent",
                          color:exclBuckets.includes(b)?"#cc2222":"#888",transition:"all .15s"}}>
                        {exclBuckets.includes(b)?"✕ "+b:"– "+b}
                        {exclBuckets.includes(b) && <span style={{cursor:"pointer",opacity:.6,fontSize:14,lineHeight:1}} onClick={e=>{e.stopPropagation();setExclBuckets(p=>p.filter(x=>x!==b));}}>×</span>}
                      </span>
                    ))}
                  </div>
                </div>
              )}

              <div style={{border:`1px solid ${C.border}`,borderRadius:4,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 14px",background:C.elevated,borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:"0.1em",textTransform:"uppercase",color:C.textMuted}}>Matching Contacts</span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,color:C.accent}}>{filtered.length}</span>
                </div>
                <div style={{maxHeight:300,overflowY:"auto"}}>
                  {filtered.length===0 && <div style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:11,padding:"20px 14px",textAlign:"center"}}>No contacts match</div>}
                  {filtered.slice(0,60).map((c,i)=>(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:i<filtered.length-1?`1px solid ${C.border}`:"none"}}>
                      <div style={{width:28,height:28,background:"rgba(232,98,42,.08)",border:`1px solid rgba(232,98,42,.2)`,borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11,color:C.accent,flexShrink:0}}>
                        {(c.first_name?.[0]||"")+(c.last_name?.[0]||"")}
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <span style={{fontSize:14,fontWeight:600,color:C.text}}>{c.first_name} {c.last_name}</span>
                        {c.company && <span style={{color:C.textMuted,fontSize:13}}> · {c.company}</span>}
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted}}>{c.email}</div>
                      </div>
                      {(c.contact_tags||[]).slice(0,2).map(ct=>ct.tags?.name&&(
                        <span key={ct.tag_id} className="us-tag" style={{fontSize:10}}>{ct.tags.name}</span>
                      ))}
                    </div>
                  ))}
                  {filtered.length>60 && <div style={{padding:"8px 14px",fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,textAlign:"center"}}>+{filtered.length-60} more</div>}
                </div>
              </div>
            </div>

            {/* Summary sidebar */}
            <div>
              <SLabel>Send Summary</SLabel>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"16px"}}>
                {[
                  {label:"Template", val:mode==="compose" ? `Compose: "${composeSubject}"` : selTmpl?.name},
                  {label:"Recipients", val:filtered.length, accent:true},
                  {label:"Has Email", val:`${filtered.length} / ${(allContacts||[]).length}`},
                  selTags.length>0&&{label:"Tag Filters", val:selTags.join(", ")},
                  selBuckets.length>0&&{label:"Bucket Filters", val:selBuckets.join(", ")},
                  exclBuckets.length>0&&{label:"Excluding Buckets", val:exclBuckets.join(", ")},
                ].filter(Boolean).map(({label,val,accent})=>(
                  <div key={label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`}}>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,letterSpacing:"0.08em",textTransform:"uppercase"}}>{label}</span>
                    <span style={{fontSize:14,fontWeight:700,color:accent?C.accent:C.text}}>{val}</span>
                  </div>
                ))}
                {(selTags.length>0||selBuckets.length>0||exclBuckets.length>0||search) && (
                  <button className="us-btn" onClick={()=>{setSelTags([]);setSelBuckets([]);setExclBuckets([]);setSearch("");}}
                    style={{marginTop:12,width:"100%",justifyContent:"center",fontSize:10}}>✕ CLEAR FILTERS</button>
                )}
              </div>
            </div>
          </div>
          <NavBtns nextLabel={`REVIEW ${filtered.length} RECIPIENTS →`} nextDisabled={filtered.length===0}/>
        </div>
      )}

      {/* ── STEP 2: REVIEW ── */}
      {step===2 && (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <SLabel>{recipients.length} Recipients</SLabel>
          </div>
          <div style={{border:`1px solid ${C.border}`,borderRadius:4,overflow:"hidden",marginBottom:4}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",padding:"8px 14px",background:C.elevated,borderBottom:`1px solid ${C.border}`,fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:C.textMuted,gap:8}}>
              <span>Name</span><span>Email</span><span>Company</span><span>Tags</span>
            </div>
            <div style={{maxHeight:420,overflowY:"auto"}}>
              {recipients.map((c,i)=>(
                <div key={c.id} style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr auto",padding:"9px 14px",borderBottom:i<recipients.length-1?`1px solid ${C.border}`:"none",alignItems:"center",gap:8}}>
                  <span style={{fontSize:14,fontWeight:600,color:C.text}}>{c.first_name} {c.last_name}</span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:C.textMuted}}>{c.email}</span>
                  <span style={{fontSize:13,color:C.textMuted}}>{c.company||"—"}</span>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"flex-end"}}>
                    {(c.contact_tags||[]).slice(0,2).map(ct=>ct.tags?.name&&(
                      <span key={ct.tag_id} className="us-tag" style={{fontSize:10}}>{ct.tags.name}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <NavBtns nextLabel="CONFIGURE & SEND →"/>
        </div>
      )}

      {/* ── STEP 3: SEND ── */}
      {step===3 && preselectedContacts?.length === 1 && (
        // Single contact — simple send now screen, no throttle
        <div style={{maxWidth:520}}>
          <SLabel>Ready to Send</SLabel>
          <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"16px",marginBottom:16}}>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,width:60,textTransform:"uppercase",letterSpacing:"0.08em"}}>To</span>
                <span style={{fontSize:14,fontWeight:600,color:C.text}}>{queue[0]?.first_name} {queue[0]?.last_name} &lt;{queue[0]?.email}&gt;</span>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,width:60,textTransform:"uppercase",letterSpacing:"0.08em"}}>Subject</span>
                <span style={{fontSize:14,color:C.text}}>{mode==="compose" ? composeSubject : (selTmpl?.subject||selTmpl?.name||"")}</span>
              </div>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,width:60,textTransform:"uppercase",letterSpacing:"0.08em",paddingTop:2}}>Via</span>
                <span style={{fontSize:13,color:gmailConnected?C.green:C.textMuted,fontFamily:"'JetBrains Mono',monospace"}}>{gmailConnected ? `● ${gmailUserEmail||"Gmail"}` : "⚠ Gmail not connected"}</span>
              </div>
            </div>
          </div>

          {sendState==="idle" && (
            <button className="us-btn us-save-btn" onClick={runSend} disabled={!gmailConnected}
              style={{width:"100%",justifyContent:"center",fontSize:14,padding:"12px",opacity:gmailConnected?1:0.5}}>
              {gmailConnected ? "✉ SEND NOW" : "CONNECT GMAIL TO SEND"}
            </button>
          )}
          {sendState==="running" && (
            <div style={{display:"flex",alignItems:"center",gap:10,justifyContent:"center",padding:"12px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:4}}>
              <div className="us-spinner" style={{width:14,height:14,borderWidth:2}}/>
              <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:C.textMuted}}>SENDING…</span>
            </div>
          )}
          {sendState==="done" && (
            <div style={{textAlign:"center",padding:"20px",background:C.surface,border:`1px solid ${C.border}`,borderRadius:4}}>
              {failCount===0
                ? <div style={{color:C.green,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:14}}>✓ EMAIL SENT</div>
                : <div style={{color:C.red,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:14}}>✕ SEND FAILED — check console</div>
              }
            </div>
          )}

          <div style={{marginTop:16}}>
            <button className="us-btn" onClick={goBack}>← BACK</button>
          </div>
        </div>
      )}

      {step===3 && !(preselectedContacts?.length === 1) && (
        <div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 300px",gap:24}}>
            {/* Queue */}
            <div>
              <SLabel>Send Queue</SLabel>
              <div style={{border:`1px solid ${C.border}`,borderRadius:4,overflow:"hidden"}}>
                {/* Progress */}
                <div style={{padding:"12px 16px",borderBottom:`1px solid ${C.border}`}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textSub}}>{sentCount+failCount} of {queue.length} processed</span>
                    <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,color:C.accent}}>{progress}%</span>
                  </div>
                  <div style={{height:4,background:C.border,borderRadius:2,overflow:"hidden"}}>
                    <div style={{height:"100%",borderRadius:2,width:`${progress}%`,background:C.accent,transition:"width .4s ease"}}/>
                  </div>
                  <div style={{display:"flex",gap:16,marginTop:8}}>
                    {[{l:"Sent",v:sentCount,c:C.green},{l:"Failed",v:failCount,c:C.red},{l:"Queued",v:queue.filter(q=>q._status==="queued").length,c:C.textMuted}].map(({l,v,c})=>(
                      <div key={l} style={{display:"flex",gap:5,alignItems:"center"}}>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:c}}>{v}</span>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.08em"}}>{l}</span>
                      </div>
                    ))}
                  </div>
                </div>
                {/* Rows */}
                <div style={{maxHeight:380,overflowY:"auto"}}>
                  {queue.map((c,i)=>(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:i<queue.length-1?`1px solid ${C.border}`:"none",opacity:c._status==="queued"?0.45:1,transition:"opacity .3s"}}>
                      <div style={{width:26,height:26,background:"rgba(232,98,42,.06)",border:`1px solid rgba(232,98,42,.15)`,borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:10,color:C.accent,flexShrink:0}}>
                        {(c.first_name?.[0]||"")+(c.last_name?.[0]||"")}
                      </div>
                      <div style={{flex:1}}>
                        <span style={{fontSize:14,fontWeight:600,color:C.text}}>{c.first_name} {c.last_name}</span>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted,marginLeft:8}}>{c.email}</span>
                      </div>
                      {c._status==="sending"
                        ? <div className="us-spinner" style={{width:14,height:14,borderWidth:1.5}}/>
                        : <StatusBadge s={c._status}/>
                      }
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Controls */}
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {/* Schedule / Now toggle */}
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"16px",marginBottom:0}}>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.16em",textTransform:"uppercase",color:C.textMuted,marginBottom:10}}>Send Timing</div>
                <div style={{display:"flex",gap:6,marginBottom:12}}>
                  {["now","scheduled"].map(m=>(
                    <button key={m} onClick={()=>{setScheduleMode(m);setSchedSaved(false);}} className="us-btn"
                      style={{flex:1,justifyContent:"center",fontSize:11,padding:"7px 6px",
                        background:scheduleMode===m?"rgba(232,98,42,.08)":"transparent",
                        borderColor:scheduleMode===m?C.accent:C.border,
                        color:scheduleMode===m?C.accent:C.textMuted,fontWeight:scheduleMode===m?700:500}}>
                      {m==="now"?"▶ SEND NOW":"⏱ SCHEDULE"}
                    </button>
                  ))}
                </div>
                {scheduleMode==="scheduled" && !schedSaved && (
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Campaign Name</div>
                      <input className="us-input" value={schedName} onChange={e=>setSchedName(e.target.value)} placeholder="e.g. Nov Outreach Wave 1" style={{fontSize:13,padding:"7px 10px"}}/>
                    </div>
                    <div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Start Date</div>
                        <input type="date" className="us-input" value={schedStart} onChange={e=>setSchedStart(e.target.value)} style={{fontSize:13,padding:"7px 10px"}}/>
                    </div>
                    <div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Emails per Day</div>
                      <input type="number" className="us-input" value={schedDailyLimit} min={1} max={500}
                        onChange={e=>setSchedDailyLimit(parseInt(e.target.value)||50)} style={{fontSize:13,padding:"7px 10px"}}/>
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      <div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Window Start (PST)</div>
                        <input type="time" className="us-input" value={schedWindowStart} onChange={e=>setSchedWindowStart(e.target.value)} style={{fontSize:13,padding:"7px 10px"}}/>
                      </div>
                      <div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Window End (PST)</div>
                        <input type="time" className="us-input" value={schedWindowEnd} onChange={e=>setSchedWindowEnd(e.target.value)} style={{fontSize:13,padding:"7px 10px"}}/>
                      </div>
                    </div>
                    <div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>Send Days</div>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>{
                          const on=schedDays.includes(d);
                          return <button key={d} onClick={()=>setSchedDays(prev=>on?prev.filter(x=>x!==d):[...prev,d])} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,padding:"5px 9px",borderRadius:3,border:`1px solid ${on?C.accent:C.border}`,background:on?"rgba(232,98,42,.1)":"transparent",color:on?C.accent:C.textMuted,cursor:"pointer",letterSpacing:"0.05em"}}>{d}</button>;
                        })}
                      </div>
                    </div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,background:C.elevated,padding:"8px 10px",borderRadius:3}}>
                      {(()=>{
                        const daysPerWeek=schedDays.length||1;
                        const sendDaysNeeded=Math.ceil(recipients.length/schedDailyLimit);
                        const calDays=Math.ceil(sendDaysNeeded*(7/daysPerWeek));
                        return `${recipients.length} recipients · ${schedDailyLimit}/day · ${schedDays.length?schedDays.join(" "):"no days selected"} · ~${calDays} calendar day${calDays!==1?"s":""}`;
                      })()}
                    </div>
                    <button className="us-btn us-save-btn" onClick={saveScheduledSend} disabled={schedSaving}
                      style={{justifyContent:"center"}}>
                      {schedSaving?"SAVING…":"⏱ SAVE SCHEDULE"}
                    </button>
                  </div>
                )}
                {scheduleMode==="scheduled" && schedSaved && (
                  <div style={{textAlign:"center",padding:"12px 0"}}>
                    <div style={{color:C.green,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:13,marginBottom:6}}>✓ SCHEDULED</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted}}>{recipients.length} contacts · starts {schedStart}</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,marginTop:4}}>Execution requires the Vercel backend scheduler.</div>
                  </div>
                )}
              </div>

              {/* Rate — hidden for blast mode and scheduled */}
              {mode !== "blast" && scheduleMode === "now" && <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"16px"}}>
                <SLabel>Throttle Rate</SLabel>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                  {SEND_RATES.map(r=>(
                    <button key={r.value} onClick={()=>setRate(r.value)} className="us-btn"
                      style={{
                        justifyContent:"center",fontSize:12,padding:"8px 6px",
                        background:rate===r.value?"rgba(232,98,42,.08)":"transparent",
                        borderColor:rate===r.value?C.accent:C.border,
                        color:rate===r.value?C.accent:C.textMuted,
                        fontWeight:rate===r.value?700:500,
                      }}>{r.label}</button>
                  ))}
                </div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted}}>
                  1 email / {(msPerSend/1000).toFixed(1)}s · ~{Math.ceil(queue.length/rate)}m total
                </div>
              </div>}

              {/* Send / Simulation — hidden when scheduling */}
              {scheduleMode === "now" && <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,padding:"16px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <SLabel style={{marginBottom:0}}>{mode==="blast" ? "Send via Resend" : gmailConnected ? "Send via Gmail" : "Simulation"}</SLabel>
                  {mode==="blast"
                    ? <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.accent,letterSpacing:"0.06em"}}>✦ RESEND — NO LIMIT</span>
                    : gmailConnected
                      ? <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.green,letterSpacing:"0.06em"}}>● GMAIL CONNECTED</span>
                      : <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.06em"}}>CONNECT GMAIL TO SEND REAL EMAILS</span>
                  }
                </div>
                {sendState==="idle" && (
                  <button className="us-btn us-save-btn" onClick={runSend} style={{width:"100%",justifyContent:"center"}}>
                    {mode==="blast" ? `✦ BLAST ${queue.length} EMAIL${queue.length!==1?"S":""}` : gmailConnected ? `▶ SEND ${queue.length} EMAIL${queue.length!==1?"S":""}` : "▶ RUN SIMULATION"}
                  </button>
                )}
                {sendState==="running" && (
                  <button className="us-btn" onClick={pauseSend} style={{width:"100%",justifyContent:"center",borderColor:"#c45c00",color:"#c45c00",background:"rgba(196,92,0,.06)"}}>
                    ⏸ PAUSE
                  </button>
                )}
                {sendState==="paused" && (
                  <div style={{display:"flex",gap:6}}>
                    <button className="us-btn us-save-btn" onClick={runSend} style={{flex:1,justifyContent:"center"}}>▶ RESUME</button>
                    <button className="us-btn" onClick={resetSend}>↺ RESET</button>
                  </div>
                )}
                {sendState==="done" && (
                  <div style={{textAlign:"center"}}>
                    <div style={{color:C.green,fontFamily:"'JetBrains Mono',monospace",fontWeight:700,fontSize:13,marginBottom:6}}>
                      {gmailConnected ? "✓ SEND COMPLETE" : "✓ SIMULATION COMPLETE"}
                    </div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted,marginBottom:10}}>{sentCount} sent · {failCount} failed</div>
                    <button className="us-btn" onClick={resetSend} style={{fontSize:11}}>↺ RUN AGAIN</button>
                  </div>
                )}
              </div>}
            </div>
          </div>

          {/* Activity log */}
          {log.length>0 && (
            <div style={{marginTop:24}}>
              <SLabel>Activity Log</SLabel>
              <div style={{border:`1px solid ${C.border}`,borderRadius:4,overflow:"hidden"}}>
                <div style={{maxHeight:180,overflowY:"auto"}}>
                  {log.slice(0,50).map((entry,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"7px 14px",borderBottom:i<log.length-1?`1px solid ${C.border}`:"none"}}>
                      <StatusBadge s={entry.status}/>
                      <span style={{fontSize:13,fontWeight:600,color:C.text,flex:1}}>{entry.name}</span>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted}}>{entry.email}</span>
                      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted}}>{entry.time}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          <div style={{marginTop:24,paddingTop:20,borderTop:`1px solid ${C.border}`}}>
            <button className="us-btn" onClick={goBack}>← BACK TO REVIEW</button>
          </div>
        </div>
      )}
    </div>
  );
};

// ── App
// ── Scheduled Sends Page
const ScheduledSendsPage = () => {
  const [sends, setSends] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState(null);
  const [statusFilter, setStatusFilter] = useState("all");

  const load = async () => {
    setLoading(true);
    try {
      const data = await supaFetch("/scheduled_sends?order=created_at.desc&limit=40");
      setSends(data || []);
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  useEffect(() => { load(); }, []);

  const cancelSend = async (id) => {
    if (!confirm("Cancel this scheduled send?")) return;
    await supaFetch(`/scheduled_sends?id=eq.${id}`, { method:"PATCH", body:JSON.stringify({status:"cancelled"}) });
    load();
  };

  const deleteSend = async (id) => {
    if (!confirm("Delete this send permanently?")) return;
    await supaFetch(`/scheduled_sends?id=eq.${id}`, { method:"DELETE", headers:{Prefer:""} });
    setSends(prev => prev.filter(s => s.id !== id));
    if (expanded === id) setExpanded(null);
  };

  const statusColor = (s) => ({scheduled:"#2563eb",running:"#e8622a",completed:"#16a34a",cancelled:"#999"}[s]||"#999");
  const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "—";
  const fmtTime = (iso) => iso ? new Date(iso).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZoneName:"short"}) : "";
  const dayLabels = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

  const STATUS_TABS = ["all","scheduled","running","completed","cancelled"];
  const filtered = statusFilter === "all" ? sends : sends.filter(s => s.status === statusFilter);

  const counts = STATUS_TABS.reduce((acc, t) => {
    acc[t] = t === "all" ? sends.length : sends.filter(s => s.status === t).length;
    return acc;
  }, {});

  return (
    <div style={{padding:"32px 32px 48px",maxWidth:960,margin:"0 auto"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
        <div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:"0.2em",color:C.accent,textTransform:"uppercase",marginBottom:4}}>Bulk Sends</div>
          <div style={{fontSize:26,fontWeight:800,color:C.text,letterSpacing:"0.02em"}}>Send History</div>
        </div>
        <button className="us-btn" onClick={load}>↻ REFRESH</button>
      </div>

      {/* Status filter tabs */}
      <div style={{display:"flex",gap:2,marginBottom:20,borderBottom:`1px solid ${C.border}`}}>
        {STATUS_TABS.map(t => (
          <button key={t} onClick={()=>setStatusFilter(t)} style={{
            background:"transparent",border:"none",cursor:"pointer",
            padding:"8px 16px",fontFamily:"'JetBrains Mono',monospace",fontSize:10,
            fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase",
            color:statusFilter===t?C.accent:C.textMuted,
            borderBottom:`2px solid ${statusFilter===t?C.accent:"transparent"}`,
            marginBottom:-1,transition:"color .15s",
          }}>
            {t} {counts[t] > 0 && <span style={{opacity:0.6}}>({counts[t]})</span>}
          </button>
        ))}
      </div>

      {loading ? (
        <div className="us-loading"><div className="us-spinner"/>LOADING</div>
      ) : filtered.length === 0 ? (
        <div style={{textAlign:"center",padding:"80px 0",color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:12,letterSpacing:"0.1em"}}>
          NO {statusFilter === "all" ? "" : statusFilter.toUpperCase() + " "}SENDS YET
        </div>
      ) : (
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {filtered.map(s => {
            const sched = s.schedule || {};
            const isExp = expanded === s.id;
            const recipCount = (s.recipient_ids || []).length;
            const sent = s.config?.sent ?? s.sends_completed ?? 0;
            const failed = s.config?.failed ?? 0;
            const pct = recipCount > 0 ? Math.round((sent / recipCount) * 100) : 0;
            const isCompleted = s.status === "completed";
            const isScheduled = s.status === "scheduled";

            return (
              <div key={s.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:4,overflow:"hidden"}}>
                {/* Row */}
                <div onClick={()=>setExpanded(isExp?null:s.id)}
                  style={{display:"flex",alignItems:"center",gap:14,padding:"13px 18px",cursor:"pointer"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:statusColor(s.status),flexShrink:0}}/>

                  {/* Name + type */}
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:15,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.name}</div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.12em",textTransform:"uppercase",color:C.textMuted,marginTop:2}}>
                      {s.mode === "template" ? (s.config?.template_name || "Template") : s.mode === "blast" ? "HTML Blast" : "Compose"}
                      {" · "}{fmtDate(s.created_at)}
                    </div>
                  </div>

                  {/* Metrics */}
                  {isCompleted ? (
                    <div style={{display:"flex",gap:20,alignItems:"center"}}>
                      {[
                        {label:"RECIPIENTS", val:recipCount, color:C.text},
                        {label:"SENT",       val:sent,       color:"#16a34a"},
                        {label:"FAILED",     val:failed,     color: failed>0 ? C.red : C.textMuted},
                      ].map(({label,val,color})=>(
                        <div key={label} style={{textAlign:"right",minWidth:50}}>
                          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color}}>{val}</div>
                          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:C.textMuted,letterSpacing:"0.1em"}}>{label}</div>
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div style={{display:"flex",gap:14,alignItems:"center"}}>
                      <div style={{textAlign:"right",minWidth:60}}>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:700,color:C.text}}>{sent}/{recipCount}</div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:C.textMuted,letterSpacing:"0.1em"}}>SENT</div>
                      </div>
                      <div style={{width:70,flexShrink:0}}>
                        <div style={{height:3,background:C.border,borderRadius:2,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:statusColor(s.status),borderRadius:2}}/>
                        </div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:8,color:C.textMuted,marginTop:2,textAlign:"right"}}>{pct}%</div>
                      </div>
                    </div>
                  )}

                  {/* Status badge */}
                  <div style={{
                    fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.12em",
                    textTransform:"uppercase",color:statusColor(s.status),
                    border:`1px solid ${statusColor(s.status)}`,borderRadius:2,
                    padding:"2px 8px",flexShrink:0,opacity:s.status==="cancelled"?0.5:1
                  }}>{s.status}</div>

                  <div style={{color:C.textMuted,fontSize:10,flexShrink:0,transition:"transform .15s",transform:isExp?"rotate(180deg)":"rotate(0deg)"}}>▼</div>
                </div>

                {/* Expanded */}
                {isExp && (
                  <div style={{borderTop:`1px solid ${C.border}`,padding:"16px 18px 18px",display:"flex",flexDirection:"column",gap:14}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:12}}>
                      {[
                        ["Recipients",  `${recipCount} contacts`],
                        ["Sent",        sent],
                        ["Failed",      failed],
                        ["Date",        fmtDate(s.created_at)],
                        ...(!isCompleted ? [
                          ["Start Date",  fmtDate(sched.start_date)],
                          ["Daily Limit", sched.daily_limit ? `${sched.daily_limit}/day` : "—"],
                          ["Window",      sched.window_start ? `${sched.window_start}–${sched.window_end} PST` : "—"],
                          ["Next Send",   s.next_send_at ? `${fmtDate(s.next_send_at)} ${fmtTime(s.next_send_at)}` : "—"],
                        ] : []),
                      ].map(([label, val]) => (
                        <div key={label}>
                          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.textMuted,marginBottom:3}}>{label}</div>
                          <div style={{fontSize:14,fontWeight:600,color:C.text}}>{val}</div>
                        </div>
                      ))}
                    </div>

                    {/* Send days (scheduled only) */}
                    {sched.send_days?.length > 0 && (
                      <div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.textMuted,marginBottom:6}}>Send Days</div>
                        <div style={{display:"flex",gap:4}}>
                          {dayLabels.map((d,i) => (
                            <div key={d} style={{
                              padding:"3px 8px",borderRadius:2,fontSize:10,fontFamily:"'JetBrains Mono',monospace",
                              background:sched.send_days.includes(i)?"rgba(232,98,42,.12)":C.border,
                              color:sched.send_days.includes(i)?C.accent:C.textMuted,
                              border:`1px solid ${sched.send_days.includes(i)?"rgba(232,98,42,.3)":C.border}`,
                              fontWeight:sched.send_days.includes(i)?700:400,
                            }}>{d}</div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Subject */}
                    {s.config?.subject && (
                      <div>
                        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.14em",textTransform:"uppercase",color:C.textMuted,marginBottom:3}}>Subject</div>
                        <div style={{fontSize:14,color:C.text,fontStyle:"italic"}}>"{s.config.subject}"</div>
                      </div>
                    )}

                    {/* Actions */}
                    <div style={{display:"flex",gap:8,paddingTop:4}}>
                      {isScheduled && (
                        <button className="us-btn" onClick={()=>cancelSend(s.id)} style={{fontSize:12,padding:"6px 14px"}}>✕ CANCEL</button>
                      )}
                      <button className="us-btn us-delete-btn" onClick={()=>deleteSend(s.id)} style={{fontSize:12,padding:"6px 14px"}}>DELETE</button>
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

function App() {
  const mob = useMobile();
  const [contacts, setContacts] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selected, setSelected] = useState(null);
  const [creatingNew, setCreatingNew] = useState(false);
  const [view, setView] = useState("contacts"); // contacts | bulk | settings
  const [bulkSendContacts, setBulkSendContacts] = useState(null);

  const goTo = (v) => { setView(v); setSelected(null); setCreatingNew(false); if(v!=="bulk") setBulkSendContacts(null); };

  const handleBulkSendFromTable = (selectedContacts) => {
    const contacts = Array.isArray(selectedContacts) ? selectedContacts : [selectedContacts];
    setBulkSendContacts(contacts);
    setView("bulk");
  };

  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      // Paginate through all contacts in batches of 1000
      const PAGE = 1000;
      const base = "/contacts?order=last_name.asc,first_name.asc&select=*,contact_tags(tag_id,tags(id,name)),contact_buckets(bucket_id,buckets(id,name))";
      let all = [];
      let offset = 0;
      while (true) {
        const batch = await supaFetch(`${base}&limit=${PAGE}&offset=${offset}`, {
          headers: { "Range-Unit": "items" }
        });
        if (!batch || batch.length === 0) break;
        all = all.concat(batch);
        if (batch.length < PAGE) break; // last page
        offset += PAGE;
      }
      setContacts(all);
    } catch(e) { setError(e.message); }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  useEffect(() => { window.__bulkRefresh = load; return () => { delete window.__bulkRefresh; }; }, [load]);

  const handleSave = (updated) => {
    setSelected(updated);
    setContacts(prev => prev.map(c => c.id===updated.id ? updated : c));
  };

  const handleDelete = (id) => {
    setContacts(prev => prev.filter(c => c.id !== id));
    setSelected(null);
  };

  const handleCreated = async (newContact) => {
    // Re-fetch with full joins so contact_buckets/tags are present in detail view
    let full = newContact;
    try {
      const data = await supaFetch(`/contacts?id=eq.${newContact.id}&select=*,contact_tags(tag_id,tags(id,name)),contact_buckets(bucket_id,buckets(id,name))`);
      if (data && data[0]) full = data[0];
    } catch(e) {}
    setContacts(prev => [...prev, full].sort((a,b) => {
      const an = (a.last_name||"").toLowerCase();
      const bn = (b.last_name||"").toLowerCase();
      return an < bn ? -1 : an > bn ? 1 : 0;
    }));
    setCreatingNew(false);
    setSelected(full);
  };

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text}}>
      {/* Nav bar */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"0 24px",display:"flex",alignItems:"center",gap:0}}>
        <div onClick={()=>goTo("contacts")} className="us-nav-brand" style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:700,letterSpacing:"0.2em",color:C.accent,textTransform:"uppercase",marginRight:28,padding:"14px 0",cursor:"pointer",whiteSpace:"nowrap"}}>
          Urban Street CRM
        </div>
        <div style={{display:"flex",gap:2,flex:1}}>
          {[{key:"contacts",label:"CONTACTS"},{key:"bulk",label:"BULK SENDS"},{key:"scheduled",label:"SCHEDULED"}].map(({key,label})=>(
            <button key={key} onClick={()=>goTo(key)} style={{
              display: mob && (key==="bulk"||key==="scheduled") ? "none" : undefined,
              background:"transparent",border:"none",cursor:"pointer",
              padding:"14px 18px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,
              fontWeight:700,letterSpacing:"0.12em",color:view===key?C.accent:C.textMuted,
              borderBottom:`2px solid ${view===key?C.accent:"transparent"}`,
              marginBottom:-1,transition:"color .15s",
            }}>{label}</button>
          ))}
        </div>
        <div className="us-nav-gmail" style={{display:"flex",alignItems:"center",gap:16,paddingRight:8}}>
          <GmailStatusBar/>
        </div>
        <button onClick={()=>goTo("settings")} title="Settings" style={{background:"transparent",border:"none",color:view==="settings"?C.accent:"#999",cursor:"pointer",fontSize:18,padding:"4px",lineHeight:1,transition:"color .15s"}}
          onMouseEnter={e=>{e.currentTarget.style.color=C.accent}} onMouseLeave={e=>e.currentTarget.style.color=view==="settings"?C.accent:"#999"}>⚙</button>
      </div>
      {/* Content */}
      {view==="settings"
        ? <SettingsPage onBack={()=>goTo("contacts")} allContacts={contacts}/>
        : view==="scheduled"
          ? <ScheduledSendsPage/>
          : view==="bulk"
          ? <BulkSendsPage allContacts={contacts} preselectedContacts={bulkSendContacts}/>
          : loading
            ? <div className="us-loading"><div className="us-spinner"/>LOADING CONTACTS</div>
            : error
              ? <div className="us-loading" style={{color:"#ff4444"}}>ERROR: {error}</div>
              : creatingNew
                ? <NewContactForm onBack={()=>setCreatingNew(false)} onCreated={handleCreated}/>
                : selected
                  ? <ContactDetail contact={selected} onBack={()=>setSelected(null)} onSave={handleSave} onDelete={handleDelete} onSendEmail={handleBulkSendFromTable}/>
                  : <ContactsTable contacts={contacts} onSelect={setSelected} onNew={()=>setCreatingNew(true)} onBulkSend={handleBulkSendFromTable}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<GmailProvider><App/></GmailProvider>);
</script>
</body>
</html>
