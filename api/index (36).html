);

const SignatureForm = ({ sig, onSave, onCancel }) => {
  const [form, setForm] = useState(sig || {...EMPTY_SIG});
  const [saving, setSaving] = useState(false);
  const [preview, setPreview] = useState(false);
  const set = (f,v) => setForm(p=>({...p,[f]:v}));

  const handleSave = async () => {
    if (!form.name.trim()) { alert("Signature name is required."); return; }
    setSaving(true);
    try {
      const payload = {...form, html_output: buildSigHtml(form)};
      let result;
      if (sig?.id) {
        result = await supaFetch(`/signatures?id=eq.${sig.id}`, { method:"PATCH", body:JSON.stringify(payload) });
        result = Array.isArray(result) ? result[0] : (result || {...payload, id:sig.id});
      } else {
        result = await supaFetch("/signatures", { method:"POST", body:JSON.stringify(payload) });
        result = Array.isArray(result) ? result[0] : result;
      }
      onSave(result);
    } catch(e) { alert("Failed: "+e.message); }
    setSaving(false);
  };

  return (
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:24,marginBottom:16}}>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

            <option>ProbateLend</option>
          </select>
        </div>
      </div>

        <SigField label="Email" field="email" placeholder="robert@urbansv.com" form={form} set={set}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <SigField label="Phone" field="phone" placeholder="(949) 555-0100" form={form} set={set}/>
        <SigField label="Website" field="website" placeholder="https://urbansv.com" form={form} set={set}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
        <SigField label="Tagline" field="tagline" placeholder="Off-Market Real Estate" form={form} set={set}/>
        <div style={{display:"flex",flexDirection:"column",gap:5}}>

          <div style={{display:"flex",gap:8,alignItems:"center"}}>

              style={{width:40,height:36,border:"none",background:"none",cursor:"pointer",padding:0}}/>
            <input className="us-input" value={form.accent_color||""} onChange={e=>set("accent_color",e.target.value)} style={{flex:1}}/>
          </div>
        </div>
      </div>
      <div style={{display:"flex",gap:24,marginBottom:16}}>
        <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted}}>
          <input type="checkbox" checked={!!form.is_default} onChange={e=>set("is_default",e.target.checked)}
            style={{accentColor:C.accent,width:14,height:14}}/>
          DEFAULT SIGNATURE
        </label>
      </div>
      {/* Preview */}
      <div style={{marginBottom:16}}>
        <button className="us-btn" onClick={()=>setPreview(p=>!p)} style={{padding:"4px 14px",fontSize:11,marginBottom:preview?10:0}}>
          {preview?"▲ HIDE":"▼ PREVIEW"}
        </button>
        {preview && (
          <div style={{background:"#fff",borderRadius:4,padding:16,marginTop:8}}

        <button className="us-btn" onClick={onCancel}>CANCEL</button>
        <button className="us-btn us-save-btn" onClick={handleSave} disabled={saving}>{saving?"SAVING…":"✓ SAVE SIGNATURE"}</button>
      </div>
    </div>
  );
};

// ── Bulk Gmail Sync
const BulkGmailSync = ({ allContacts }) => {
  const { connected } = React.useContext(GmailContext);
  const [syncing, setSyncing] = useState(false);
  const [results, setResults] = useState(null);
  const [progress, setProgress] = useState({ done: 0, total: 0, current: "" });
  const cancelRef = useRef(false);

  const withEmail = (allContacts||[]).filter(c => c.email);

  const runBulkSync = async () => {
    if (!connected) { alert("Connect Gmail first."); return; }
    if (!confirm(`Sync Gmail history for all ${withEmail.length} contacts with email addresses? This may take several minutes.`)) return;
    setSyncing(true);
    cancelRef.current = false;
    setResults(null);
    setProgress({ done: 0, total: withEmail.length, current: "" });
    let synced = 0, skipped = 0, failed = 0;
    for (let i = 0; i < withEmail.length; i++) {
      if (cancelRef.current) break;
      const c = withEmail[i];
      const name = `${c.first_name||""} ${c.last_name||""}`.trim() || c.email;
      setProgress({ done: i, total: withEmail.length, current: name });
      try {
        const threads = await gmailSyncContact(c.id, c.email);
        if (threads.length > 0) synced++;
        else skipped++;
      } catch(e) {
        console.warn("Sync failed for", c.email, e.message);
        failed++;
      }
      await new Promise(r => setTimeout(r, 200));
    }
    setSyncing(false);
    setResults({ synced, skipped, failed, total: withEmail.length });
    setProgress(p => ({ ...p, done: withEmail.length, current: "" }));
  };

  const pct = progress.total > 0 ? Math.round((progress.done / progress.total) * 100) : 0;

  return (
    <div>
      <div style={{marginBottom:16,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textMuted,lineHeight:1.8}}>
        Pull Gmail thread history for every contact with an email into the conversations database.
        Required for AI scoring to have engagement data to work from.
      </div>
      {!connected && (
        <div style={{background:"rgba(204,34,34,.07)",border:`1px solid rgba(204,34,34,.25)`,borderRadius:4,padding:"12px 16px",fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.red,marginBottom:16}}>
          ✕ Gmail not connected — use the Connect Gmail button in the nav bar first.
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20,flexWrap:"wrap"}}>
        <button className="us-btn us-save-btn" onClick={runBulkSync} disabled={syncing||!connected}
          style={{padding:"10px 24px",fontSize:13}}>
          {syncing ? "⏳ SYNCING…" : `↓ SYNC ALL ${withEmail.length} CONTACTS`}
        </button>
        {syncing && (
          <button className="us-btn us-delete-btn" onClick={()=>{cancelRef.current=true;}} style={{padding:"8px 16px",fontSize:12}}>
            ✕ CANCEL
          </button>
        )}
      </div>
      {syncing && (
        <div style={{marginBottom:20}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textSub,overflow:"hidden",textOverflow:"ellipsis",maxWidth:"80%"}}>
              {progress.current ? progress.current : "Starting…"}
            </span>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,color:C.accent}}>{pct}%</span>
          </div>
          <div style={{height:6,background:C.border,borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pct}%`,background:C.accent,borderRadius:3,transition:"width .3s"}}/>
          </div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,marginTop:6}}>
            {progress.done} / {progress.total} contacts processed
          </div>
        </div>
      )}
      {results && (
        <div style={{background:C.elevated,border:`1px solid ${C.border}`,borderRadius:4,padding:"16px 20px"}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.16em",textTransform:"uppercase",color:C.accent,marginBottom:10}}>Sync Complete</div>
          <div style={{display:"flex",gap:24}}>
            {[{l:"With threads",v:results.synced,c:C.green},{l:"No history",v:results.skipped,c:C.textMuted},{l:"Errors",v:results.failed,c:C.red}].map(({l,v,c})=>(
              <div key={l}>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:22,fontWeight:900,color:c}}>{v}</div>
                <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted,letterSpacing:"0.08em",textTransform:"uppercase"}}>{l}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

const ScoringSettings = () => {
  const [rules, setRules] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [running, setRunning] = useState(false);
  const [msg, setMsg] = useState('');
  const dragIdx = useRef(null);
  const dragOverIdx = useRef(null);

  const flash = (m) => { setMsg(m); setTimeout(() => setMsg(''), 4000); };

  useEffect(() => {
    fetch('/api/scoring-rules')
      .then(r => r.json())
      .then(d => { setRules(d.rules || []); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const update = (id, field, val) =>
    setRules(prev => prev.map(r => r.id === id ? { ...r, [field]: val } : r));

  const onDragStart = (i) => { dragIdx.current = i; };
  const onDragEnter = (i) => { dragOverIdx.current = i; };
  const onDragEnd = () => {
    const from = dragIdx.current;
    const to = dragOverIdx.current;
    if (from === null || to === null || from === to) return;
    setRules(prev => {
      const next = [...prev];
      const [moved] = next.splice(from, 1);
      next.splice(to, 0, moved);
      return next;
    });
    dragIdx.current = null;
    dragOverIdx.current = null;
  };

  const save = async () => {
    setSaving(true);
    try {
      const res = await fetch('/api/scoring-rules', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rules }),
      });
      flash(res.ok ? 'Rules saved.' : 'Error saving rules.');
    } catch { flash('Error saving rules.'); }
    setSaving(false);
  };

  const recalc = async () => {
    setRunning(true);
    try {
      const res = await fetch('/api/calculate-scores', { method: 'POST' });
      const d = await res.json();
      flash(res.ok ? `Scores updated for ${d.processed} contacts.` : 'Error: ' + d.error);
    } catch { flash('Error running scoring.'); }
    setRunning(false);
  };

  if (loading) return <div style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:11,padding:"20px 0"}}>Loading…</div>;

  return (
    <div style={{maxWidth:540}}>
      <div style={{display:"grid",gridTemplateColumns:"24px 1fr 88px 52px",gap:8,marginBottom:6,
        fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.14em",
        textTransform:"uppercase",color:C.textMuted}}>
        <span/>
        <span>Signal</span>
        <span style={{textAlign:"center"}}>Points</span>
        <span style={{textAlign:"center"}}>On</span>
      </div>
      {rules.map((rule, i) => (
        <div key={rule.id}
          draggable
          onDragStart={() => onDragStart(i)}
          onDragEnter={() => onDragEnter(i)}
          onDragEnd={onDragEnd}
          onDragOver={e => e.preventDefault()}
          style={{display:"grid",gridTemplateColumns:"24px 1fr 88px 52px",gap:8,
            alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`,
            opacity:rule.enabled?1:0.4,cursor:"grab"}}>
          <span style={{color:C.textMuted,fontSize:14,cursor:"grab",userSelect:"none",textAlign:"center"}}>⠿</span>
          <span style={{fontSize:15,fontWeight:600,color:C.text}}>{rule.label}</span>
          <input
            type="number"
            value={rule.points}
            onChange={e => update(rule.id, 'points', parseInt(e.target.value)||0)}
            style={{width:"100%",padding:"5px 8px",textAlign:"center",
              border:`1px solid ${C.border}`,borderRadius:3,
              fontFamily:"'JetBrains Mono',monospace",fontSize:13,
              color:rule.points<0?C.red:C.green,outline:"none",cursor:"text"}}
          />
          <div onClick={() => update(rule.id, 'enabled', !rule.enabled)}
            style={{width:36,height:20,borderRadius:10,cursor:"pointer",margin:"0 auto",
              background:rule.enabled?C.accent:"#d0d0d5",position:"relative",transition:"background .2s"}}>
            <div style={{position:"absolute",top:2,left:rule.enabled?16:2,
              width:16,height:16,borderRadius:"50%",background:"#fff",
              transition:"left .2s",boxShadow:"0 1px 3px rgba(0,0,0,.2)"}}/>
          </div>
        </div>
      ))}
      <div style={{marginTop:20,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
        <button className="us-btn us-save-btn" onClick={save} disabled={saving} style={{padding:"8px 20px"}}>
          {saving?"SAVING…":"SAVE RULES"}
        </button>
        <button className="us-btn" onClick={recalc} disabled={running}
          style={{padding:"8px 20px",borderColor:C.accent,color:C.accent}}>
          {running?"RUNNING…":"RECALCULATE SCORES"}
        </button>
        {msg && <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:C.textSub}}>{msg}</span>}
      </div>
      <div style={{marginTop:16,fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:C.textMuted}}>
        Hot ≥ 80 · Warm 50–79 · Cold &lt; 50 · Investors excluded · Auto-runs with email sync
      </div>
    </div>
  );
};

const UNSUB_DOMAIN = "https://urbansv.vercel.app"; // Update after Vercel deploy

const applyMerge = (body, contact) => {
  if (!body) return "";
  const cap = s => s ? s.charAt(0).toUpperCase() + s.slice(1) : "";
  return body
    .replace(/{{first_name}}/gi, cap(contact.first_name)||"")
    .replace(/{{last_name}}/gi, cap(contact.last_name)||"")
    .replace(/{{full_name}}/gi, `${cap(contact.first_name)||""} ${cap(contact.last_name)||""}`.trim())
    .replace(/{{email}}/gi, contact.email||"")
    .replace(/{{cell}}/gi, contact.cell_phone||"")
    .replace(/{{company}}/gi, contact.company||"")
    .replace(/{{city}}/gi, contact.city||"")
    .replace(/{{state}}/gi, contact.state||"")
    .replace(/{{id}}/gi, contact.id||"")
    .replace(/{{unsub_url}}/gi, `${UNSUB_DOMAIN}/api/unsubscribe?id=${contact.id}`);
};
