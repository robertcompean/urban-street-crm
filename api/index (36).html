<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Urban Street CRM</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#f4f4f5;font-family:'Barlow Condensed',sans-serif;}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:#f4f4f5}
  ::-webkit-scrollbar-thumb{background:#d0d0d5;border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:#b0b0b8}
  .us-table-wrap{width:100%;overflow-x:auto}
  .us-table{width:100%;border-collapse:collapse;font-size:15px}
  .us-table thead th{background:#ffffff;color:#888;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid #e2e2e5;white-space:nowrap;position:sticky;top:0;z-index:2}
  .us-table tbody tr{border-bottom:1px solid #e2e2e5;cursor:pointer;transition:background .1s}
  .us-table tbody tr:hover{background:#f0f0f2}
  .us-table tbody tr:hover .us-row-arrow{opacity:1;transform:translateX(0)}
  .us-table tbody td{padding:10px 12px;vertical-align:middle;white-space:nowrap}
  .us-row-arrow{opacity:0;transform:translateX(-4px);transition:all .15s;color:#e8622a}
  .us-detail{animation:slideIn .22s cubic-bezier(.16,1,.3,1)}
  @keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
  .us-field-card{background:#fff;border:1px solid #e2e2e5;border-radius:4px;transition:border-color .15s}
  .us-field-card:hover{border-color:#bbbbc2}
  .us-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:2px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.08em;text-transform:uppercase}
  .us-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 16px;background:transparent;border:1px solid #d0d0d5;color:#666;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border-radius:3px;transition:all .15s}
  .us-btn:hover{border-color:#e8622a;color:#e8622a;background:rgba(232,98,42,.04)}
  .us-btn:disabled{opacity:0.5;cursor:not-allowed}
  .us-save-btn{background:#e8622a;border-color:#e8622a;color:#fff;font-weight:700}
  .us-save-btn:hover:not(:disabled){background:#c8501a;border-color:#c8501a;color:#fff}
  .us-delete-btn{border-color:#cc2222;color:#cc2222}
  .us-delete-btn:hover{background:rgba(204,34,34,.06);border-color:#cc2222;color:#cc2222}
  .us-edit-contact-btn{background:#e8622a;border-color:#e8622a;color:#fff;font-weight:700}
  .us-edit-contact-btn:hover{background:#c8501a;border-color:#c8501a;color:#fff}
  .us-section-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:#999;margin-bottom:8px}
  .us-mono{font-family:'JetBrains Mono',monospace}
  .us-search{background:#fff;border:1px solid #d0d0d5;color:#111;font-family:'Barlow Condensed',sans-serif;font-size:15px;padding:10px 16px;border-radius:3px;outline:none;width:240px;transition:border-color .15s}
  .us-search:focus{border-color:#e8622a}
  .us-search::placeholder{color:#aaa}
  .us-loading{display:flex;align-items:center;justify-content:center;min-height:300px;gap:12px;color:#999;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.08em}
  .us-spinner{width:20px;height:20px;border:2px solid #e2e2e5;border-top-color:#e8622a;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .us-input{background:#fff;border:1px solid #d0d0d5;border-radius:3px;color:#111;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;padding:10px 14px;width:100%;outline:none;transition:border-color .15s}
  .us-input:focus{border-color:#e8622a}
  .us-input::placeholder{color:#bbb;font-weight:400}
  .us-input-mono{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:400}
  .us-select{background:#fff;border:1px solid #d0d0d5;border-radius:3px;color:#111;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;padding:10px 14px;width:100%;outline:none;transition:border-color .15s;cursor:pointer;-webkit-appearance:none;appearance:none}
  .us-select:focus{border-color:#e8622a}
  .us-textarea{background:#fff;border:1px solid #d0d0d5;border-radius:3px;color:#111;font-family:'JetBrains Mono',monospace;font-size:13px;line-height:1.6;padding:12px 14px;width:100%;min-height:100px;resize:vertical;outline:none;transition:border-color .15s}
  .us-textarea:focus{border-color:#e8622a}
  .us-textarea::placeholder{color:#bbb}
  .us-tag{display:inline-block;padding:2px 8px;background:#f0f0f2;border:1px solid #e2e2e5;border-radius:2px;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;color:#666}
  .us-tag-pill{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(232,98,42,.08);border:1px solid rgba(232,98,42,.3);border-radius:12px;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;color:#e8622a}
  .us-tag-pill-remove{cursor:pointer;opacity:.6;font-size:14px;line-height:1;transition:opacity .1s}
  .us-tag-pill-remove:hover{opacity:1}
  .us-tag-available{display:inline-flex;align-items:center;padding:4px 10px;background:transparent;border:1px solid #d0d0d5;border-radius:12px;font-size:12px;font-family:'JetBrains Mono',monospace;letter-spacing:.04em;color:#888;cursor:pointer;transition:all .15s}
  .us-tag-available:hover{border-color:#e8622a;color:#e8622a;background:rgba(232,98,42,.04)}
  .us-divider{border:none;border-top:1px solid #e2e2e5;margin:24px 0}
  .us-avatar{width:52px;height:52px;background:#f0f0f2;border:1px solid #e2e2e5;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#e8622a;flex-shrink:0}
  .us-toast{position:fixed;bottom:24px;right:24px;background:#e8622a;color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.1em;padding:10px 20px;border-radius:3px;animation:toastIn .2s ease;z-index:999}
  .us-toast-red{background:#cc2222;color:#fff}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .edit-section{background:#fff;border:1px solid #e2e2e5;border-radius:4px;padding:20px;display:flex;flex-direction:column;gap:16px}
  .edit-section-title{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#e8622a;margin-bottom:4px}
  /* Confirm modal */
  .us-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
  .us-modal{background:#fff;border:1px solid #e2e2e5;border-radius:6px;padding:32px;max-width:400px;width:90%;text-align:center}
  /* Column settings panel */
  .us-settings-panel{position:absolute;top:100%;right:0;background:#fff;border:1px solid #d0d0d5;border-radius:4px;padding:16px;min-width:200px;z-index:10;margin-top:6px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
  .us-col-toggle{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #e2e2e5;cursor:pointer;gap:12px}
  .us-col-toggle:last-child{border-bottom:none}
  .us-col-toggle-label{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:#888;text-transform:uppercase}
  .us-col-toggle:hover .us-col-toggle-label{color:#111}
  .us-switch{width:28px;height:16px;background:#d0d0d5;border-radius:8px;position:relative;flex-shrink:0;transition:background .15s}
  .us-switch.on{background:#e8622a}
  .us-switch::after{content:'';position:absolute;width:12px;height:12px;background:#fff;border-radius:50%;top:2px;left:2px;transition:transform .15s}
  .us-switch.on::after{transform:translateX(12px)}
  /* Conversations */
  .us-conv-thread{transition:border-color .15s,background .15s}
  .us-conv-thread:hover{border-color:#bbbbc2 !important}
  .us-msg-bubble{transition:none}
  /* Mobile utilities */
  @media(max-width:640px){
    .us-mob-hide{display:none!important}
    .us-mob-full{width:100%!important;min-width:0!important}
    .us-mob-pad{padding:16px 12px!important}
    .us-mob-grid1{grid-template-columns:1fr!important}
    .us-mob-smaller{font-size:22px!important}
    .us-search{width:100%!important}
    .us-table-wrap{overflow-x:hidden}
    .us-table{table-layout:fixed;width:100%}
    .us-table tbody td{overflow:hidden;text-overflow:ellipsis;max-width:0}
    .us-nav-brand{white-space:nowrap!important;font-size:9px!important;margin-right:12px!important}
    .us-nav-gmail{display:none!important}
    .us-table th:nth-child(n+3),.us-table td:nth-child(n+3){display:none}
  }
  /* FAB */
  .us-fab{position:fixed;bottom:24px;right:24px;width:52px;height:52px;border-radius:50%;background:#e8622a;color:#fff;font-size:26px;font-weight:300;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(232,98,42,.4);z-index:50;line-height:1}
  .us-fab:hover{background:#c8501a}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const useMobile = () => {
  const [mob, setMob] = useState(() => window.innerWidth <= 640);
  useEffect(() => {
    const mq = window.matchMedia("(max-width:640px)");
    const handler = (e) => setMob(e.matches);
    mq.addEventListener("change", handler);
    return () => mq.removeEventListener("change", handler);
  }, []);
  return mob;
};

const SUPABASE_URL = "https://kdxbkwcvrihcxqhukjee.supabase.co";
const SUPABASE_KEY = "sb_publishable_9whlg1wqquwmjgivsavs0A_H7HpbgE9";

const supaFetch = async (path, options = {}) => {
  const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
    ...options,
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type": "application/json",
      Prefer: "return=representation",
      ...(options.headers || {}),
    },
  });
  if (!res.ok) { const err = await res.text(); throw new Error(err); }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
};

const C = {
  bg:"#f4f4f5", surface:"#ffffff", elevated:"#f9f9f9", border:"#e2e2e5",
  accent:"#e8622a", text:"#111111", textSub:"#555555", textMuted:"#999999",
  red:"#cc2222", green:"#1a7f3c", orange:"#c45c00",
};

const fmt = {
  date: (v) => {
    if (!v) return "—";
    const d = new Date(v);
    return isNaN(d) ? v : d.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  },
  phone: (v) => {
    if (!v) return "—";
    const d = String(v).replace(/\D/g,"");
    if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
    if (d.length === 11 && d[0]==="1") return `+1 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
    return v;
  },
  val: (v) => (v == null || v === "" ? "—" : String(v)),
};

const subColor = (status) => {
  const s = String(status || "").toLowerCase();
  if (s==="active"||s==="subscribed"||s==="true") return C.green;
  if (s==="unsubscribed"||s==="false") return C.red;
  if (s==="pending") return C.orange;
  return C.textSub;
};

const formatPhoneInput = (v) => {
  const d = String(v||"").replace(/\D/g,"").slice(0,10);
  if (d.length < 4) return d;
  if (d.length < 7) return `(${d.slice(0,3)}) ${d.slice(3)}`;
  return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
};

const formatDateInput = (v) => {
  const d = String(v||"").replace(/\D/g,"").slice(0,8);
  if (d.length < 3) return d;
  if (d.length < 5) return `${d.slice(0,2)}/${d.slice(2)}`;
  return `${d.slice(0,2)}/${d.slice(2,4)}/${d.slice(4)}`;
};
const toISODate = (v) => {
  if (!v) return null;
  const parts = v.split("/");
  if (parts.length === 3 && parts[2].length === 4) return `${parts[2]}-${parts[0].padStart(2,"0")}-${parts[1].padStart(2,"0")}`;
  return v;
};
const toDisplayDate = (v) => {
  if (!v) return "";
  const parts = v.split("-");
  if (parts.length === 3) return `${parts[1]}/${parts[2]}/${parts[0]}`;
  return v;
};

// ── Read-only field components
const PhoneField = ({ label, value }) => (
  <div className="us-field-card" style={{padding:"14px 16px"}}>
    <div className="us-section-label">{label}</div>
    <div style={{display:"flex",alignItems:"center",gap:10}}>
      <span className="us-mono" style={{fontSize:15,color:C.text}}>{fmt.phone(value)}</span>
      {value && <a href={`tel:${value}`} style={{color:C.accent,fontSize:11,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.1em",textDecoration:"none",border:`1px solid ${C.border}`,padding:"2px 8px",borderRadius:2}}>CALL</a>}
    </div>
  </div>
);

const AiScoreBadge = ({ score, size="md" }) => {
  const hasScore = score !== null && score !== undefined && score !== "";
  const n = parseInt(score);
  // Hot=red, Warm=orange, Cold=blue
  const color = !hasScore ? "#aaa" : n >= 80 ? "#cc2222" : n >= 50 ? "#e8622a" : "#4a90d9";
  const bg = !hasScore ? "rgba(170,170,170,0.1)" : n >= 80 ? "rgba(204,34,34,0.1)" : n >= 50 ? "rgba(232,98,42,0.1)" : "rgba(74,144,217,0.1)";
  const fs = size === "lg" ? 18 : size === "sm" ? 10 : 13;
  const pad = size === "lg" ? "6px 14px" : size === "sm" ? "2px 6px" : "3px 10px";
  return (
    <div title={!hasScore?"No score":n>=80?"Hot":n>=50?"Warm":"Cold"} style={{display:"inline-flex",alignItems:"center",gap:4,background:bg,border:`1px solid ${color}44`,borderRadius:4,padding:pad,flexShrink:0}}>
      <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:fs,color,fontWeight:900}}>{hasScore ? n : "—"}</span>
    </div>
  );
};


const SubBadge = ({ value }) => {
  const s = String(value||"").toLowerCase().trim();
  const normalized = (s==="true"||s==="active"||s==="subscribed") ? "subscribed"
    : (s==="false"||s==="unsubscribed") ? "unsubscribed"
    : s==="pending" ? "pending"
    : s || null;
  const color = subColor(normalized);
  const label = normalized ? normalized.toUpperCase() : "UNKNOWN";
  return (
    <div className="us-field-card" style={{padding:"14px 16px"}}>
      <div className="us-section-label">Subscription Status</div>
      <span className="us-badge" style={{background:`${color}22`,border:`1px solid ${color}55`,color}}>
        <span style={{width:6,height:6,borderRadius:"50%",background:color,display:"inline-block"}}/>
        {label}
      </span>
    </div>
  );
};

// ── Edit field components
const toProperCase = (str) => str.replace(/\S+/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());

const EField = ({ label, field, form, onChange, mono=false, placeholder="" }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <input className={`us-input${mono?" us-input-mono":""}`} value={form[field]||""} onChange={e=>onChange(field,e.target.value)} placeholder={placeholder||label}/>
  </div>
);

const ENameField = ({ label, field, form, onChange, placeholder="" }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <input className="us-input" value={form[field]||""} onChange={e=>onChange(field,toProperCase(e.target.value))} placeholder={placeholder||label}/>
  </div>
);

const EPhoneField = ({ label, field, form, onChange }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <input className="us-input us-input-mono" value={form[field]||""} onChange={e=>onChange(field,formatPhoneInput(e.target.value))} placeholder="(000) 000-0000"/>
  </div>
);

const EDateField = ({ label, field, form, onChange }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <input className="us-input us-input-mono" value={toDisplayDate(form[field])||""} onChange={e=>onChange(field,toISODate(formatDateInput(e.target.value)))} placeholder="MM/DD/YYYY"/>
  </div>
);

const ESelect = ({ label, field, form, options, onChange }) => (
  <div style={{display:"flex",flexDirection:"column",gap:6}}>
    <div className="us-section-label">{label}</div>
    <div style={{position:"relative"}}>
      <select className="us-select" value={form[field]||""} onChange={e=>onChange(field,e.target.value)}>
        <option value="">— Select —</option>
        {options.map(o=><option key={o} value={o}>{o}</option>)}
      </select>
      <span style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",color:"#555",pointerEvents:"none",fontSize:10}}>▼</span>
    </div>
  </div>
);

// ── Buckets Section (junction-table based, like TagsSection)
const BucketsSection = ({ contactId, editing }) => {
  const [allBuckets, setAllBuckets] = useState([]);
  const [contactBuckets, setContactBuckets] = useState([]);
  const [loading, setLoading] = useState(true);
  const [newName, setNewName] = useState("");
  const [adding, setAdding] = useState(false);
  const [showNew, setShowNew] = useState(false);

  const load = async () => {
    setLoading(true);
    try {
      const [all, cb] = await Promise.all([
        supaFetch("/buckets?order=name.asc"),
        supaFetch(`/contact_buckets?contact_id=eq.${contactId}&select=bucket_id`),
      ]);
      setAllBuckets(all||[]);
      setContactBuckets((cb||[]).map(r=>r.bucket_id));
    } catch(e) { console.error(e); }
    setLoading(false);
  };

  useEffect(() => { load(); }, [contactId]);

  const addBucket = async (bucketId) => {
    try {
      await supaFetch("/contact_buckets", { method:"POST", body:JSON.stringify({ contact_id:contactId, bucket_id:bucketId }) });
      setContactBuckets(prev=>[...prev, bucketId]);
    } catch(e) { console.error(e); }
  };

  const removeBucket = async (bucketId) => {
    try {
      await supaFetch(`/contact_buckets?contact_id=eq.${contactId}&bucket_id=eq.${bucketId}`, { method:"DELETE", headers:{Prefer:""} });
      setContactBuckets(prev=>prev.filter(id=>id!==bucketId));
    } catch(e) { console.error(e); }
  };

  const createAndAdd = async () => {
    const name = newName.trim();
    if (!name) return;
    setAdding(true);
    try {
      const result = await supaFetch("/buckets", { method:"POST", body:JSON.stringify({ name }) });
      const created = Array.isArray(result) ? result[0] : result;
      setAllBuckets(prev=>[...prev, created].sort((a,b)=>a.name.localeCompare(b.name)));
      await supaFetch("/contact_buckets", { method:"POST", body:JSON.stringify({ contact_id:contactId, bucket_id:created.id }) });
      setContactBuckets(prev=>[...prev, created.id]);
      setNewName(""); setShowNew(false);
    } catch(e) { alert("Failed to create bucket: "+e.message); }
    setAdding(false);
  };

  const assigned = allBuckets.filter(b=>contactBuckets.includes(b.id));
  const available = allBuckets.filter(b=>!contactBuckets.includes(b.id));

  if (loading) return <div style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:11}}>Loading…</div>;

  return (
    <div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom: editing && available.length ? 10 : 0}}>
        {assigned.length === 0 && !editing && <span style={{color:C.textMuted,fontFamily:"'JetBrains Mono',monospace",fontSize:12}}>No buckets</span>}
        {assigned.map(b=>(
          <span key={b.id} className="us-tag-pill">
            {b.name}
            {editing && <span className="us-tag-pill-remove" onClick={()=>removeBucket(b.id)}>×</span>}
          </span>
        ))}
      </div>
      {editing && available.length > 0 && (
        <div style={{marginBottom:10}}>
          <div style={{fontSize:10,fontFamily:"'JetBrains Mono',monospace",letterSpacing:"0.12em",color:C.textMuted,textTransform:"uppercase",marginBottom:8}}>Add bucket</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {available.map(b=>(
              <span key={b.id} className="us-tag-available" onClick={()=>addBucket(b.id)}>+ {b.name}</span>
            ))}
          </div>
        </div>
      )}
      {editing && (
        showNew ? (
          <div style={{display:"flex",gap:6,marginTop:6}}>
            <input className="us-input" value={newName} onChange={e=>setNewName(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")createAndAdd();if(e.key==="Escape"){setShowNew(false);setNewName("");}}}

// Build RFC 2822 email + base64url encode
const buildRawEmail = ({ to, subject, body, sigHtml, fromEmail }) => {
  const boundary = `boundary_${Date.now()}`;
  const plainBody = body;
  const htmlBody = `<div style="font-family:Arial,sans-serif;font-size:14px;line-height:1.6;color:#222;">${body.replace(/\n/g,"<br/>")}</div>${sigHtml ? `<br/>${sigHtml}` : ""}`;

  const raw = [
    `From: ${fromEmail || gmailUserEmail}`,
    `To: ${to}`,
    `Subject: ${subject}`,
    "MIME-Version: 1.0",
    `Content-Type: multipart/alternative; boundary="${boundary}"`,
    "",
    `--${boundary}`,
    "Content-Type: text/plain; charset=UTF-8",
    "",
    plainBody,
    "",
    `--${boundary}`,
    "Content-Type: text/html; charset=UTF-8",
    "",
    htmlBody,
    "",
    `--${boundary}--`,
  ].join("\r\n");

  return btoa(unescape(encodeURIComponent(raw)))
    .replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
};

// Send one email via Gmail API
const gmailSend = async ({ to, subject, body, sigHtml, fromEmail }) => {

// Fetch messages for a contact email, sync to Supabase
const gmailSyncContact = async (contactId, contactEmail) => {
  // Search for threads involving this contact
  const q = encodeURIComponent(`from:${contactEmail} OR to:${contactEmail}`);
  const list = await gmailFetch(`/users/me/threads?q=${q}&maxResults=20`);
  if (!list?.threads?.length) return [];

  const synced = [];
  for (const t of list.threads) {
    const thread = await gmailFetch(`/users/me/threads/${t.id}?format=full`);
    if (!thread?.messages?.length) continue;

    const firstMsg = thread.messages[0];
    const headers = firstMsg.payload?.headers || [];
    const getH = (n) => headers.find(h=>h.name.toLowerCase()===n.toLowerCase())?.value || "";
    const subject = getH("Subject") || "(no subject)";
    const lastMsg = thread.messages[thread.messages.length - 1];
    const lastHeaders = lastMsg.payload?.headers || [];
    const getLH = (n) => lastHeaders.find(h=>h.name.toLowerCase()===n.toLowerCase())?.value || "";
    const lastDate = new Date(parseInt(lastMsg.internalDate));

    const lastIsOut = getLH("From").toLowerCase().includes(gmailUserEmail?.split("@")[0]?.toLowerCase() || "___");
    const lastDirection = lastIsOut ? "outbound" : "inbound";

    // Upsert conversation in Supabase
    let conv;
    try {
      const existing = await supaFetch(`/conversations?gmail_thread_id=eq.${t.id}&select=id`);
      if (existing?.length) {
        conv = existing[0];
        await supaFetch(`/conversations?id=eq.${conv.id}`, {
          method: "PATCH",
          body: JSON.stringify({ last_message_at: lastDate.toISOString(), snippet: getSnippet(lastMsg), last_direction: lastDirection }),
        });
      } else {
        const res = await supaFetch("/conversations", {
          method: "POST",
          body: JSON.stringify({
            contact_id: contactId,
            gmail_thread_id: t.id,
            subject,
            snippet: getSnippet(firstMsg),
            last_message_at: lastDate.toISOString(),
            unread: false,
            last_direction: lastDirection,
          }),
        });
        conv = Array.isArray(res) ? res[0] : res;
      }
    } catch(e) { console.error("Conv upsert error:", e); continue; }

    // Upsert each message
    for (const msg of thread.messages) {
      try {
        const mHeaders = msg.payload?.headers || [];
        const mGetH = (n) => mHeaders.find(h=>h.name.toLowerCase()===n.toLowerCase())?.value || "";
        const fromEmail = mGetH("From");
        const isOut = fromEmail.toLowerCase().includes(gmailUserEmail?.split("@")[0]?.toLowerCase() || "___");
        const sentAt = new Date(parseInt(msg.internalDate)).toISOString();
        const bodyText = extractBody(msg.payload, "text/plain");
        const bodyHtml = extractBody(msg.payload, "text/html");

        const existingMsg = await supaFetch(`/messages?gmail_message_id=eq.${msg.id}&select=id`);
        if (!existingMsg?.length) {
          await supaFetch("/messages", {
            method: "POST",
            body: JSON.stringify({
              conversation_id: conv.id,
              gmail_message_id: msg.id,
              direction: isOut ? "outbound" : "inbound",
              from_email: fromEmail,
              subject: mGetH("Subject"),
              body_text: bodyText,
              body_html: bodyHtml,
              sent_at: sentAt,
            }),
          });
        }
      } catch(e) { console.error("Msg upsert error:", e); }
    }
    synced.push(conv);
  }
  return synced;
};

const getSnippet = (msg) => {
  const text = extractBody(msg.payload, "text/plain");
  return (text || "").slice(0, 120).replace(/\s+/g, " ").trim();
};

const extractBody = (payload, mimeType) => {
  if (!payload) return "";
  if (payload.mimeType === mimeType && payload.body?.data) {
    try { return decodeURIComponent(escape(atob(payload.body.data.replace(/-/g,"+").replace(/_/g,"/")))); } catch(e) { return ""; }
  }
  if (payload.parts) {
    for (const part of payload.parts) {
      const result = extractBody(part, mimeType);
      if (result) return result;
    }
  }
  return "";
};

// ── Gmail Context (shared token state across components)
const GmailContext = React.createContext({ connected: false, userEmail: null, token: null, connect: ()=>{}, disconnect: ()=>{}, autoConnecting: true });

const GmailProvider = ({ children }) => {
  const [connected, setConnected] = useState(false);
  const [userEmail, setUserEmail] = useState(null);
  const [token, setToken] = useState(null);
  const [autoConnecting, setAutoConnecting] = useState(true);

  // On mount: try to auto-connect using stored refresh token in Supabase
  useEffect(() => {
    const tryAutoConnect = async () => {
      try {
        const res = await fetch("/api/gmail-token");
        if (res.ok) {
          const data = await res.json();
          if (data.access_token && data.user_email) {
            gmailAccessToken = data.access_token;
            gmailUserEmail = data.user_email;
            setToken(data.access_token);
            setUserEmail(data.user_email);
            setConnected(true);
            // Schedule refresh 5 min before expiry (expires_in is in seconds)
            const refreshIn = ((data.expires_in || 3600) - 300) * 1000;
            setTimeout(tryAutoConnect, refreshIn);
          }
        }
      } catch(e) {
        // No stored token or network error — stay disconnected
      }
      setAutoConnecting(false);
    };
    tryAutoConnect();
  }, []);

  // Manual connect via OAuth (first-time or after disconnect)
  const connect = () => {
    if (!window.google) { alert("Google Identity Services not loaded yet. Wait a moment and try again."); return; }
    const redirectUri = `${window.location.origin}/api/gmail-auth`;
    const params = new URLSearchParams({
      client_id: GMAIL_CLIENT_ID,
      redirect_uri: redirectUri,
      response_type: "code",
      scope: GMAIL_SCOPES,
      access_type: "offline",
      prompt: "consent",
    });
    window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?${params}`;
  };

  const disconnect = async () => {
    try {
      if (userEmail) {
        await supaFetch(`/gmail_tokens?user_email=eq.${encodeURIComponent(userEmail)}`, { method: "DELETE", headers: { Prefer: "" } });
      }
    } catch(e) {}
    if (gmailAccessToken) {
      window.google?.accounts.oauth2.revoke(gmailAccessToken, () => {});
    }
    gmailAccessToken = null;
    gmailUserEmail = null;
    setConnected(false);
    setToken(null);
    setUserEmail(null);
  };

  // Handle redirect back from OAuth
  useEffect(() => {
    const params = new URLSearchParams(window.location.search);
    const connectedEmail = params.get("gmail_connected");
    const gmailError = params.get("gmail_error");
    if (connectedEmail) {
      window.history.replaceState({}, "", window.location.pathname);
      // Trigger auto-connect to pick up the new token
      const tryConnect = async () => {
        try {
          const res = await fetch("/api/gmail-token");
          if (res.ok) {
            const data = await res.json();
            if (data.access_token) {
              gmailAccessToken = data.access_token;
              gmailUserEmail = data.user_email;
              setToken(data.access_token);
              setUserEmail(data.user_email);
              setConnected(true);
            }
          }
        } catch(e) {}
      };
      tryConnect();
    }
    if (gmailError) {
      window.history.replaceState({}, "", window.location.pathname);
      alert("Gmail connection failed: " + gmailError);
    }
  }, []);

  return (
    <GmailContext.Provider value={{ connected, userEmail, token, connect, disconnect, autoConnecting }}>
      {children}
    </GmailContext.Provider>
  );
};

                              padding:"10px 14px",
                            }}>
                              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:isOut?C.accent:C.textMuted,marginBottom:7,display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
                                <span style={{letterSpacing:"0.08em"}}>{isOut?"↑ SENT":"↓ RECEIVED"}</span>
                                {msg.from_email && <span style={{color:"#666"}}>{msg.from_email}</span>}
                                <span style={{marginLeft:"auto",color:"#555"}}>{fmtMsgTime(msg.sent_at)}</span>
                              </div>
                              <div style={{fontSize:14,color:C.text,lineHeight:1.65,whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
                                {msg.body_text||(msg.body_html?"(HTML content — view in email client)":"(no content)")}
                              </div>
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// ── Contact Detail
const ContactDetail = ({ contact, onBack, onSave, onDelete, onSendEmail }) => {
  const mob = useMobile();
  const [editing, setEditing] = useState(false);
  const [form, setForm] = useState({...contact, subscription_status: (() => {
    const s = String(contact.subscription_status||contact.subscribed||contact.sub_status||"").toLowerCase();
    if (s==="true"||s==="active") return "active";
    if (s==="false") return "unsubscribed";
    return s;
  })()});
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(false);
  const [showConfirm, setShowConfirm] = useState(false);
  const [deleting, setDeleting] = useState(false);
  const [customFieldDefs, setCustomFieldDefs] = useState([]);
  const [customValues, setCustomValues] = useState({}); // { field_key: value }

  useEffect(() => {
    supaFetch("/custom_field_defs?order=sort_order.asc,created_at.asc").then(defs => setCustomFieldDefs(defs||[]));
    supaFetch(`/contact_custom_values?contact_id=eq.${contact.id}`).then(vals => {
      const map = {};
      (vals||[]).forEach(v => { map[v.field_key] = v.value; });
      setCustomValues(map);
    });
  }, [contact.id]);

  const setField = (f,v) => setForm(prev=>({...prev,[f]:v}));

  const displayContact = editing ? form : contact;
  const name = [displayContact.first_name, displayContact.last_name].filter(Boolean).join(" ") || displayContact.name || "Unknown Contact";
  const initials = name.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase() || "?";

  );
};

  const mob = useMobile();
  const [form, setForm] = useState({...EMPTY_CONTACT});

  useEffect(() => {
    Promise.all([
      supaFetch("/tags?order=name.asc"),
      supaFetch("/buckets?order=name.asc"),
    ]).then(([t,b]) => { setAllTags(t||[]); setAllBuckets(b||[]); }).catch(()=>{});
  }, []);

  const toggleTag = (id) => setSelectedTagIds(prev => prev.includes(id) ? prev.filter(i=>i!==id) : [...prev, id]);
  const toggleBucket = (id) => setSelectedBucketIds(prev => prev.includes(id) ? prev.filter(i=>i!==id) : [...prev, id]);

  const createNewBucket = async () => {
    const name = newBucketName.trim();
    if (!name) return;
    try {
      const result = await supaFetch("/buckets", { method:"POST", body:JSON.stringify({ name }) });
      const created = Array.isArray(result) ? result[0] : result;
      setAllBuckets(prev => [...prev, created].sort((a,b)=>a.name.localeCompare(b.name)));
      setSelectedBucketIds(prev => [...prev, created.id]);
      setNewBucketName(""); setShowNewBucket(false);
    } catch(e) { alert("Failed to create bucket: "+e.message); }
  };

  const handleSave = async () => {
    if (!form.first_name && !form.last_name) { alert("First or last name is required."); return; }
    setSaving(true);
    try {
      const payload = {...form};
      Object.keys(payload).forEach(k => { if (payload[k]==="") delete payload[k]; });
      const result = await supaFetch("/contacts", { method:"POST", body:JSON.stringify(payload) });
      const newContact = Array.isArray(result) ? result[0] : result;
      if (selectedTagIds.length > 0) {
        await Promise.all(selectedTagIds.map(tag_id =>
          supaFetch("/contact_tags", { method:"POST", body:JSON.stringify({ contact_id: newContact.id, tag_id }) })
        ));
      }
      if (selectedBucketIds.length > 0) {
        await Promise.all(selectedBucketIds.map(bucket_id =>
          supaFetch("/contact_buckets", { method:"POST", body:JSON.stringify({ contact_id: newContact.id, bucket_id }) })
        ));
      }
      onCreated(newContact);
    } catch(e) { alert("Failed to create contact: " + e.message); }
    setSaving(false);
  };

  const name = [form.first_name, form.last_name].filter(Boolean).join(" ") || "New Contact";

          <div>
            <div style={{fontSize:32,fontWeight:800,lineHeight:1,color: form.first_name||form.last_name ? C.text : C.textMuted}}>{name}</div>
            <div className="us-mono" style={{fontSize:12,color:C.textMuted,marginTop:4,letterSpacing:"0.1em"}}>NEW CONTACT</div>
          </div>
        </div>
        <button className="us-btn us-save-btn" onClick={handleSave} disabled={saving} style={{padding:"8px 24px"}}>
          {saving ? "SAVING…" : "✓ SAVE"}
        </button>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>

        <div className="edit-section">

              {allTags.map(t => selectedTagIds.includes(t.id) ? (
                <span key={t.id} className="us-tag-pill" onClick={()=>toggleTag(t.id)} style={{cursor:"pointer"}}>
                  {t.name} <span className="us-tag-pill-remove">×</span>
                </span>
              ) : (
                <span key={t.id} className="us-tag-available" onClick={()=>toggleTag(t.id)}>+ {t.name}</span>
              ))}
            </div>
          )}
        </div>
        <div className="edit-section">
          <div className="edit-section-title">Notes</div>
          <textarea className="us-textarea" value={form.notes||""} onChange={e=>setField("notes",e.target.value)} placeholder="Notes about this contact…"/>
        </div>
        <div style={{display:"flex",justifyContent:"flex-end",gap:10,paddingTop:4}}>
          <button className="us-btn" onClick={onBack}>CANCEL</button>
          <button className="us-btn us-save-btn" onClick={handleSave} disabled={saving} style={{padding:"10px 32px",fontSize:15}}>
            {saving ? "SAVING…" : "✓ CREATE CONTACT"}
          </button>
        </div>
      </div>
    </div>
  );
};

const CSV_FIELD_MAP = [
  { key: "first_name", label: "First Name", aliases: ["first name","firstname","first_name","fname"] },
  { key: "last_name", label: "Last Name", aliases: ["last name","lastname","last_name","lname","surname"] },

];

const parseCSV = (text) => {
  const lines = text.trim().split(/\r?\n/);
  if (!lines.length) return { headers: [], rows: [] };
  const headers = lines[0].split(",").map(h => h.replace(/^"|"$/g, "").trim());
  const rows = lines.slice(1).map(line => {
    const vals = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; }
      else if (line[i] === ',' && !inQ) { vals.push(cur.trim()); cur = ""; }
      else { cur += line[i]; }
    }
    vals.push(cur.trim());
    return headers.reduce((obj, h, i) => { obj[h] = vals[i] || ""; return obj; }, {});
  }).filter(r => Object.values(r).some(v => v));
  return { headers, rows };
};

const CsvImportModal = ({ onClose, onImported }) => {
  const [step, setStep] = useState("upload"); // upload | map | preview | importing | done
  const [headers, setHeaders] = useState([]);
  const [rows, setRows] = useState([]);
  const [mapping, setMapping] = useState({});
  const [results, setResults] = useState({ success: 0, failed: 0, skipped: 0 });
  const [progress, setProgress] = useState(0);
  const [allBucketsList, setAllBucketsList] = useState([]);
  const [defaultBucketId, setDefaultBucketId] = useState("");

  const handleFile = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    // Load buckets for default bucket selector
    supaFetch("/buckets?order=name.asc").then(b => setAllBucketsList(b || [])).catch(()=>{});
    const reader = new FileReader();
    reader.onload = (ev) => {
      const { headers, rows } = parseCSV(ev.target.result);
      setHeaders(headers);
      setRows(rows);
      // Auto-map headers — exact match only
      const autoMap = {};
      headers.forEach(h => {
        const hl = h.toLowerCase().trim();
        const match = CSV_FIELD_MAP.find(f => f.aliases.includes(hl));
        if (match) autoMap[h] = match.key;
      });
      setMapping(autoMap);
      setStep("map");
    };
    reader.readAsText(file);
  };

  const runImport = async () => {
    setStep("importing");
    let success = 0, failed = 0, skipped = 0;

    // Fetch existing contacts for duplicate check
    let existing = [];
    try {
      let all = [], offset = 0;
      while (true) {
        const batch = await supaFetch(`/contacts?select=id,email&limit=1000&offset=${offset}`);
        if (!batch?.length) break;
        all = [...all, ...batch];
        if (batch.length < 1000) break;
        offset += 1000;
      }
      existing = all;
    } catch(e) {}

    // Build email→id map — split comma-separated stored emails so each maps individually
    const existingKeys = new Set();
    const emailToId = {};
    existing.forEach(c => {
      if (!c.email) return;
      const parts = c.email.split(',').map(e => e.toLowerCase().trim()).filter(Boolean);
      parts.forEach(e => {
        existingKeys.add(e);
        if (!emailToId[e]) emailToId[e] = c.id;
      });
    });

    // Pre-load all buckets and tags so we can look them up by name
    let allBuckets = [], allTags = [];
    try {
      allBuckets = await supaFetch("/buckets?order=name.asc") || [];
      allTags = await supaFetch("/tags?order=name.asc") || [];
    } catch(e) {}

    const getBucketId = async (name) => {
      const trimmed = name.trim();
      let b = allBuckets.find(x => x.name.toLowerCase() === trimmed.toLowerCase());
      if (!b) {
        const res = await supaFetch("/buckets", { method:"POST", body:JSON.stringify({ name:trimmed }) });
        b = Array.isArray(res) ? res[0] : res;
        if (b) allBuckets.push(b);
      }
      return b?.id;
    };

    const getTagId = async (name) => {
      const trimmed = name.trim();
      let t = allTags.find(x => x.name.toLowerCase() === trimmed.toLowerCase());
      if (!t) {
        const res = await supaFetch("/tags", { method:"POST", body:JSON.stringify({ name:trimmed }) });
        t = Array.isArray(res) ? res[0] : res;
        if (t) allTags.push(t);
      }
      return t?.id;
    };

    const CONTACT_FIELDS = ["first_name","last_name","email","cell","landline","company","address","city","state","zip","notes","last_activity_date","subscription_status","cs_responsiveness","cs_incoming_ads","cs_done_deal"];
    const pendingBuckets = [];

    for (let i = 0; i < rows.length; i++) {
      const row = rows[i];
      const contact = {};
      let bucketNames = [], tagNames = [];

      Object.entries(mapping).forEach(([csvCol, field]) => {
        if (!field || !row[csvCol]) return;
        if (field === "bucket") { bucketNames = row[csvCol].split(",").map(b=>b.trim()).filter(Boolean); return; }
        if (field === "tags") { tagNames = row[csvCol].split(",").map(t=>t.trim()).filter(Boolean); return; }
        if (CONTACT_FIELDS.includes(field)) contact[field] = row[csvCol];
      });

      if (!contact.first_name && !contact.last_name && !contact.email) { skipped++; continue; }

      // Duplicate check by email
      const key = (contact.email||"").toLowerCase().trim();
      if (key && existingKeys.has(key)) {
        // Contact already exists — queue bucket assignments for bulk insert
        const existingId = emailToId[key];
        if (existingId) {
          if (defaultBucketId) pendingBuckets.push({ contact_id:existingId, bucket_id:defaultBucketId });
          for (const bName of bucketNames) {
            const bucketId = await getBucketId(bName);
            if (bucketId) pendingBuckets.push({ contact_id:existingId, bucket_id:bucketId });
          }
        }
        skipped++;
        continue;
      }
      if (key) existingKeys.add(key);

      try {
        const res = await supaFetch("/contacts", { method:"POST", body:JSON.stringify(contact) });
        const created = Array.isArray(res) ? res[0] : res;
        if (created?.id) {
          if (defaultBucketId) pendingBuckets.push({ contact_id:created.id, bucket_id:defaultBucketId });
          for (const bName of bucketNames) {
            const bucketId = await getBucketId(bName);
            if (bucketId && bucketId !== defaultBucketId) pendingBuckets.push({ contact_id:created.id, bucket_id:bucketId });
          }
          // Assign tags
          for (const tagName of tagNames) {
            const tagId = await getTagId(tagName);
            if (tagId) await supaFetch("/contact_tags", { method:"POST", body:JSON.stringify({ contact_id:created.id, tag_id:tagId }) });
          }
        }
        success++;
      } catch(e) { failed++; }
      setProgress(Math.round((i + 1) / rows.length * 100));
    }
    setResults({ success, failed, skipped });

    // Bulk insert all bucket assignments (ignore duplicates)
    if (pendingBuckets.length > 0) {
      const CHUNK = 500;
      for (let i = 0; i < pendingBuckets.length; i += CHUNK) {
        const chunk = pendingBuckets.slice(i, i + CHUNK);
        try {
          await supaFetch("/contact_buckets", {
            method: "POST",
            headers: { Prefer: "resolution=ignore-duplicates,return=minimal" },
            body: JSON.stringify(chunk)
          });
        } catch(e) { console.warn("Bulk bucket insert error:", e); }
      }
    }

    setStep("done");
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:6,padding:32,width:680,maxWidth:"95vw",maxHeight:"85vh",overflowY:"auto",boxShadow:"0 8px 40px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <h2 style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:24,letterSpacing:"-0.01em",margin:0}}>IMPORT CONTACTS</h2>
          <button onClick={onClose} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#888"}}>×</button>
        </div>

        {step === "upload" && (
          <div>
            <p style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#666",marginBottom:20}}>Upload a CSV file with contact data. First row must be column headers.</p>
            <label
              onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#e8622a";}}
              onDragLeave={e=>{e.currentTarget.style.borderColor="#d0d0d5";}}
              onDrop={e=>{
                e.preventDefault();
                e.currentTarget.style.borderColor="#d0d0d5";
                const file = e.dataTransfer.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                  const { headers, rows } = parseCSV(ev.target.result);
                  setHeaders(headers); setRows(rows);
                  const autoMap = {};
                  headers.forEach(h => {
                    const hl = h.toLowerCase().trim();
                    const match = CSV_FIELD_MAP.find(f => f.aliases.includes(hl));
                    if (match) autoMap[h] = match.key;
                  });
                  setMapping(autoMap); setStep("map");
                  supaFetch("/buckets?order=name.asc").then(b => setAllBucketsList(b || [])).catch(()=>{});
                };
                reader.readAsText(file);
              }}
              style={{display:"block",border:"2px dashed #d0d0d5",borderRadius:4,padding:"40px",textAlign:"center",cursor:"pointer",background:"#f9f9f9",transition:"border-color .15s"}}>
              <input type="file" accept=".csv" onChange={handleFile} style={{display:"none"}}/>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#888"}}>DRAG & DROP CSV HERE</div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#bbb",marginTop:6}}>or click to browse</div>
            </label>
          </div>
        )}

        {step === "map" && (
          <div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#888",marginBottom:16}}>{rows.length} ROWS DETECTED — MAP YOUR COLUMNS</div>
            <div style={{display:"grid",gridTemplateColumns:mob?"1fr":"1fr 1fr",gap:10,marginBottom:24}}>
              {headers.map(h => (
                <div key={h} style={{display:"flex",flexDirection:"column",gap:4}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:"0.08em"}}>{h}</div>
                  <div style={{position:"relative"}}>
                    <select value={mapping[h]||""} onChange={e => setMapping(p => ({...p, [h]: e.target.value}))}
                      className="us-select" style={{paddingRight:28,fontSize:13}}>
                      <option value="">— Skip —</option>
                      {CSV_FIELD_MAP.map(f => <option key={f.key} value={f.key}>{f.label}</option>)}
                    </select>
                    <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",fontSize:9,color:"#888"}}>▼</span>
                  </div>
                </div>
              ))}
            </div>
            <div style={{background:"#f4f4f5",borderRadius:4,padding:"10px 14px",marginBottom:20,fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:"#666"}}>
              Preview (first row): {headers.map(h => `${mapping[h]||"skip"}: "${rows[0]?.[h]||""}"`).join(" · ")}
            </div>
            <div style={{marginBottom:20}}>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#e8622a",letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:6}}>ASSIGN ALL TO BUCKET (optional)</div>
              <div style={{position:"relative",maxWidth:280}}>
                <select value={defaultBucketId} onChange={e=>setDefaultBucketId(e.target.value)} className="us-select" style={{paddingRight:28,fontSize:13}}>
                  <option value="">— No default bucket —</option>
                  {allBucketsList.map(b => <option key={b.id} value={b.id}>{b.name}</option>)}
                </select>
                <span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",pointerEvents:"none",fontSize:9,color:"#888"}}>▼</span>
              </div>
              <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:"#bbb",marginTop:4}}>Every contact in this import will be added to the selected bucket, even duplicates.</div>
            </div>
            <div style={{display:"flex",gap:10}}>
              <button className="us-btn" onClick={() => setStep("upload")}>← BACK</button>
              <button className="us-btn us-save-btn" onClick={runImport}>IMPORT {rows.length} CONTACTS →</button>
            </div>
          </div>
        )}

        {step === "importing" && (
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,color:"#888",marginBottom:16}}>IMPORTING… {progress}%</div>
            <div style={{height:6,background:"#e2e2e5",borderRadius:3,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${progress}%`,background:"#e8622a",borderRadius:3,transition:"width .3s"}}/>
            </div>
          </div>
        )}

        {step === "done" && (
          <div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:"#e8622a",marginBottom:12}}>✓ IMPORT COMPLETE</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:"#666",lineHeight:2}}>
              <div>✓ {results.success} imported successfully</div>
              {results.failed > 0 && <div style={{color:"#cc2222"}}>✕ {results.failed} failed</div>}
              {results.skipped > 0 && <div>— {results.skipped} skipped (duplicates or no name/email)</div>}
            </div>
            <button className="us-btn us-save-btn" onClick={()=>{onImported();onClose();}} style={{marginTop:20}}>DONE</button>
          </div>
        )}
      </div>
    </div>
  );
};

const exportCSV = (contacts) => {
  const cols = [
    ["First Name",        c => c.first_name || ""],
    ["Last Name",         c => c.last_name || ""],
    ["Email",             c => c.email || ""],
    ["Cell",              c => c.cell || ""],
    ["Landline",          c => c.landline || ""],
    ["Company",           c => c.company || ""],
    ["Subscription Status", c => c.subscription_status || ""],
    ["Email Status",      c => c.email_status || ""],
    ["Last Activity",     c => c.last_activity_date || ""],
    ["Notes",             c => c.notes || ""],
    ["Buckets",           c => (c.contact_buckets||[]).map(cb=>cb.buckets?.name).filter(Boolean).join("; ")],
    ["Tags",              c => (c.contact_tags||[]).map(ct=>ct.tags?.name).filter(Boolean).join("; ")],
    ["AI Score",          c => c.ai_score != null ? c.ai_score : ""],
    ["CS Responsiveness", c => c.cs_responsiveness || ""],
    ["CS Incoming Ads",   c => c.cs_incoming_ads || ""],
    ["CS Done Deal",      c => c.cs_done_deal || ""],
    ["Created At",        c => c.created_at ? c.created_at.slice(0,10) : ""],
  ];
  const esc = v => `"${String(v).replace(/"/g,'""')}"`;
  const header = cols.map(([label]) => esc(label)).join(",");
  const rows = contacts.map(c => cols.map(([,fn]) => esc(fn(c))).join(","));
  const csv = [header, ...rows].join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `urban-street-contacts-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
};

const ContactsTable = ({ contacts, onSelect, onNew, onBulkSend }) => {

  const [importKey, setImportKey] = useState(0);
  const [showColSettings, setShowColSettings] = useState(false);
  const [colOrder, setColOrder] = useState(() => {
    try { const s = localStorage.getItem("us_col_order"); return s ? JSON.parse(s) : ALL_COLUMNS.map(c=>c.key); } catch { return ALL_COLUMNS.map(c=>c.key); }
  });
  const [visibleCols, setVisibleCols] = useState(() => {
    try { const s = localStorage.getItem("us_cols"); return s ? JSON.parse(s) : DEFAULT_VISIBLE; } catch { return DEFAULT_VISIBLE; }
  });
  const settingsRef = useRef(null);
  const dragKey = useRef(null);
  const dragOverKey = useRef(null);

  useEffect(() => {
    const handler = (e) => { if (settingsRef.current && !settingsRef.current.contains(e.target)) setShowColSettings(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const toggleCol = (key) => {
    const next = visibleCols.includes(key) ? visibleCols.filter(k=>k!==key) : [...visibleCols, key];
    setVisibleCols(next);
    try { localStorage.setItem("us_cols", JSON.stringify(next)); } catch {}
  };

  const onDragStart = (key) => { dragKey.current = key; };
  const onDragOver = (e, key) => { e.preventDefault(); dragOverKey.current = key; };
  const onDrop = () => {
    if (!dragKey.current || dragKey.current === dragOverKey.current) return;
    const next = [...colOrder];
    const from = next.indexOf(dragKey.current);
    const to = next.indexOf(dragOverKey.current);
    next.splice(from, 1);
    next.splice(to, 0, dragKey.current);
    setColOrder(next);
    try { localStorage.setItem("us_col_order", JSON.stringify(next)); } catch {}
    dragKey.current = null; dragOverKey.current = null;
  };

  const [sortKey, setSortKey] = useState("ai_score");
  const [sortDir, setSortDir] = useState("desc");
  const [showFilters, setShowFilters] = useState(false);
  const [filterBuckets, setFilterBuckets] = useState([]);
  const [filterTags, setFilterTags] = useState([]);
  const [filterStatus, setFilterStatus] = useState([]);
  const [page, setPage] = useState(0);

  useEffect(() => {
    const handler = (e) => { if (filterRef.current && !filterRef.current.contains(e.target)) setShowFilters(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, []);

  const handleSort = (key) => {

  const getSortVal = (c, key) => {
    switch(key) {
      case "name": return ([c.first_name,c.last_name].filter(Boolean).join(" ")||c.name||"").toLowerCase();
      case "email": return (c.email||"").toLowerCase();
      case "cell": return (c.cell||c.mobile||c.cell_phone||"").replace(/\D/g,"");
      case "bucket": return ((c.contact_buckets||[]).map(cb=>cb.buckets?.name).filter(Boolean).join(",")).toLowerCase();
      case "status": return (c.subscription_status||c.subscribed||c.sub_status||"").toLowerCase();
      case "last_activity": return c.last_activity_date||c.last_activity||c.last_active||"";
      case "cs_responsiveness": return (c.cs_responsiveness||"").toLowerCase();
      case "cs_incoming_ads": return (c.cs_incoming_ads||"").toLowerCase();
      case "cs_done_deal": return (c.cs_done_deal||"").toLowerCase();
      case "ai_score": return c.ai_score ?? -1;
      default: return "";
    }
  };

  // Derive available tag names from contacts
  const allTagNames = [...new Set(contacts.flatMap(c => (c.contact_tags||[]).map(ct => ct.tags?.name).filter(Boolean)))].sort();
  const allBucketNames = [...new Set(contacts.flatMap(c => (c.contact_buckets||[]).map(cb => cb.buckets?.name).filter(b => b && !b.includes(","))))].sort();
  const normalizeStatus = (v) => {
    const s = String(v||"").toLowerCase().trim();
    if (s==="true"||s==="active"||s==="subscribed") return "subscribed";
    if (s==="false"||s==="unsubscribed") return "unsubscribed";
    if (s==="pending") return "pending";
    if (!s) return null;
    return s;
  };
  const allStatuses = [...new Set(contacts.map(c => normalizeStatus(c.subscription_status||c.subscribed||c.sub_status)).filter(Boolean))].sort();

  const toggleFilter = (arr, setArr, val) => { setArr(prev => prev.includes(val) ? prev.filter(v=>v!==val) : [...prev, val]); setPage(0); };
  const clearAllFilters = () => { setFilterBuckets([]); setFilterTags([]); setFilterStatus([]); setPage(0); };
  const activeFilterCount = filterBuckets.length + filterTags.length + filterStatus.length;

  // ── Bulk selection
  const [selectedIds, setSelectedIds] = useState([]);
  const [bulkAction, setBulkAction] = useState(null);
  const [bulkWorking, setBulkWorking] = useState(false);
  const [bulkTagIds, setBulkTagIds] = useState([]);
  const [bulkBuckets, setBulkBuckets] = useState([]);
  const [allTags, setAllTags] = useState([]);
  const [allBucketsForBulk, setAllBucketsForBulk] = useState([]);

  useEffect(() => {
    supaFetch("/tags?order=name.asc").then(t => setAllTags(t||[])).catch(()=>{});
    supaFetch("/buckets?order=name.asc").then(b => setAllBucketsForBulk(b||[])).catch(()=>{});
  }, []);

  const toggleSelect = (e, id) => {
    e.stopPropagation();
    setSelectedIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);
  };
  const toggleSelectAll = () => {
    const allIds = filtered.map(c=>c.id);
    const allChecked = allIds.length > 0 && allIds.every(id=>selectedIds.includes(id));
    setSelectedIds(allChecked ? [] : allIds);
  };
  const clearSelection = () => { setSelectedIds([]); setBulkAction(null); };

  const handleBulkTags = async () => {
    if (bulkTagIds.length === 0) return;
    setBulkWorking(true);
    try {
      await Promise.all(selectedIds.flatMap(contactId =>
        bulkTagIds.map(tagId =>
          supaFetch("/contact_tags", { method:"POST", body:JSON.stringify({ contact_id:contactId, tag_id:tagId }) })
            .catch(()=>{})
        )
      ));
      setBulkAction(null); setBulkTagIds([]); clearSelection();
      window.__bulkRefresh && window.__bulkRefresh();
    } catch(e) { alert("Bulk tag failed: "+e.message); }
    setBulkWorking(false);
  };

  const handleBulkBuckets = async () => {
    if (bulkBuckets.length === 0) return;
    setBulkWorking(true);
    try {
      await Promise.all(selectedIds.flatMap(contactId =>
        bulkBuckets.map(bucketId =>
          supaFetch("/contact_buckets", { method:"POST", body:JSON.stringify({ contact_id:contactId, bucket_id:bucketId }) })
            .catch(()=>{})
        )
      ));
      setBulkAction(null); setBulkBuckets([]); clearSelection();
      window.__bulkRefresh && window.__bulkRefresh();
    } catch(e) { alert("Bulk bucket failed: "+e.message); }
    setBulkWorking(false);
  };

  const handleBulkDelete = async () => {
    setBulkWorking(true);
    try {
      await Promise.all(selectedIds.map(id =>
        supaFetch(`/contacts?id=eq.${id}`, { method:"DELETE", headers:{ Prefer:"" } })
      ));
      setBulkAction(null); clearSelection();
      window.__bulkRefresh && window.__bulkRefresh();
    } catch(e) { alert("Bulk delete failed: "+e.message); }
    setBulkWorking(false);
  };

  const filtered = contacts.filter(c => {
    const q = search.toLowerCase();
    const name = [c.first_name,c.last_name,c.name,c.full_name].filter(Boolean).join(" ").toLowerCase();
    if (!(name.includes(q)||(c.email||"").toLowerCase().includes(q)||(c.contact_buckets||[]).some(cb=>(cb.buckets?.name||"").toLowerCase().includes(q))||(c.cell||c.mobile||"").includes(q))) return false;
    if (filterBuckets.length > 0) {
      const cBucketNames = (c.contact_buckets||[]).map(cb=>cb.buckets?.name).filter(Boolean);
      if (!filterBuckets.some(b => cBucketNames.includes(b))) return false;
    }
    if (filterTags.length > 0) {
      const cTagNames = (c.contact_tags||[]).map(ct=>ct.tags?.name).filter(Boolean);
      if (!filterTags.every(t => cTagNames.includes(t))) return false;
    }
    if (filterStatus.length > 0) {
      const cStatus = normalizeStatus(c.subscription_status||c.subscribed||c.sub_status||"");
      if (!filterStatus.includes(cStatus)) return false;
    }
    return true;
  }).sort((a, b) => {
    const av = getSortVal(a, sortKey);
    const bv = getSortVal(b, sortKey);
    const cmp = av < bv ? -1 : av > bv ? 1 : 0;
    return sortDir === "asc" ? cmp : -cmp;
  });

  const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
  const paginated = filtered.slice(page * PAGE_SIZE, (page + 1) * PAGE_SIZE);
  const someSelected = selectedIds.length > 0;

  const allSelected = filtered.length > 0 && filtered.every(c=>selectedIds.includes(c.id));
  const orderedCols = colOrder.map(k => ALL_COLUMNS.find(c=>c.key===k)).filter(Boolean);
  const visibleOrdered = orderedCols.filter(c => visibleCols.includes(c.key));

  const renderCell = (c, key) => {
    const name = [c.first_name,c.last_name].filter(Boolean).join(" ")||c.name||c.full_name||"—";
    const rawStatus = c.subscription_status||c.subscribed||c.sub_status;
    const s = String(rawStatus||"").toLowerCase().trim();
    const subStatus = (s==="true"||s==="active"||s==="subscribed") ? "subscribed"
      : (s==="false"||s==="unsubscribed") ? "unsubscribed"
      : s==="pending" ? "pending"
      : s || null;
    const color = subColor(subStatus);
    switch(key) {
      case "name": return <td key={key} style={{fontWeight:700,fontSize:15,color:C.text}}><div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}><span>{name}</span>{mob && c.ai_score!=null && <AiScoreBadge score={c.ai_score} size="sm"/>}</div></td>;
      case "ai_score": return <td key={key}>{c.ai_score !== null && c.ai_score !== undefined ? <AiScoreBadge score={c.ai_score} size="sm"/> : <span style={{color:C.textMuted}}>—</span>}</td>;
      case "email": return <td key={key} className="us-mono" style={{fontSize:13,color:C.textSub}}>{c.email||"—"}</td>;
      case "cell": return <td key={key} className="us-mono" style={{fontSize:13,color:C.text}}>{fmt.phone(c.cell||c.mobile||c.cell_phone)}</td>;
      case "bucket": return <td key={key}><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{(c.contact_buckets||[]).length>0?(c.contact_buckets||[]).map(cb=>cb.buckets?<span key={cb.bucket_id} className="us-tag">{cb.buckets.name}</span>:null):<span style={{color:C.textMuted}}>—</span>}</div></td>;
      case "status": return <td key={key}><span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:6,height:6,borderRadius:"50%",background:color,display:"inline-block",flexShrink:0}}/><span className="us-mono" style={{fontSize:11,color,letterSpacing:"0.06em"}}>{subStatus!=null?String(subStatus).toUpperCase():"—"}</span></span></td>;
      case "last_activity": return <td key={key} className="us-mono" style={{fontSize:13,color:C.textSub}}>{fmt.date(c.last_activity_date||c.last_activity||c.last_active)}</td>;
      case "tags": return <td key={key}><div style={{display:"flex",flexWrap:"wrap",gap:4}}>{(c.contact_tags||[]).map(ct=>ct.tags?<span key={ct.tag_id} className="us-tag-pill" style={{fontSize:10,padding:"2px 7px"}}>{ct.tags.name}</span>:null)}{(!c.contact_tags||c.contact_tags.length===0)&&<span style={{color:C.textMuted,fontSize:12}}>—</span>}</div></td>;
      case "cs_responsiveness": return <td key={key} className="us-mono" style={{fontSize:12,color:C.textSub}}>{c.cs_responsiveness||"—"}</td>;
      case "cs_incoming_ads": return <td key={key} className="us-mono" style={{fontSize:12,color:C.textSub}}>{c.cs_incoming_ads||"—"}</td>;
      case "cs_done_deal": return <td key={key} className="us-mono" style={{fontSize:12,color:C.textSub}}>{c.cs_done_deal||"—"}</td>;
      default: return null;
    }
  };

  return (
    <div style={{padding:mob?"16px 12px":"32px 24px"}}>
      {showImport && (
        <CsvImportModal
          key={importKey}
          onClose={() => setShowImport(false)}
          onImported={() => { setImportKey(k => k+1); setShowImport(false); window.location.reload(); }}
        />
      )}
      {mob ? (
        <div style={{marginBottom:16}}>
          <div style={{marginBottom:10}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.2em",color:C.accent,textTransform:"uppercase",marginBottom:4}}>Urban Street / CRM</div>
            <h1 style={{fontSize:28,fontWeight:900,lineHeight:1,letterSpacing:"-0.02em",color:C.text}}>CONTACTS</h1>
          </div>
          <input className="us-search" placeholder="Search contacts…" value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} style={{width:"100%",marginBottom:10}}/>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <div className="us-mono" style={{fontSize:13,color:C.text,fontWeight:700}}><span style={{color:filtered.length < contacts.length ? C.accent : C.text}}>{filtered.length}</span><span style={{color:C.textMuted,fontWeight:400}}> / {contacts.length}</span></div>
            <div style={{position:"relative"}} ref={filterRef}>
              <button className="us-btn" onClick={()=>setShowFilters(v=>!v)} style={{padding:"8px 12px",fontSize:12,display:"flex",alignItems:"center",gap:6,borderColor: activeFilterCount>0?C.accent:"#252525",color: activeFilterCount>0?C.accent:"#888"}}>
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2h14l-5 6v5l-4-2V8L1 2z"/></svg>
                {activeFilterCount>0?`(${activeFilterCount})`:""}
              </button>
            {showFilters && (
              <div className="us-settings-panel" style={{minWidth:280,right:"auto",left:0}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.16em",color:C.accent,textTransform:"uppercase"}}>Filters</div>
                  {activeFilterCount>0 && <span onClick={clearAllFilters} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.red,cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase"}}>Clear all</span>}
                </div>
                {/* Bucket filter */}
                {allBucketNames.length > 0 && (
                <div style={{marginBottom:14}}>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Bucket</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {allBucketNames.map(b=>{
                      const cnt = contacts.filter(c=>(c.contact_buckets||[]).some(cb=>cb.buckets?.name===b)).length;
                      return (
                        <span key={b} onClick={()=>toggleFilter(filterBuckets,setFilterBuckets,b)}
                          style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterBuckets.includes(b)?C.accent:"#333"}`,background:filterBuckets.includes(b)?"rgba(232,255,71,0.1)":"transparent",color:filterBuckets.includes(b)?C.accent:"#888",transition:"all .12s"}}>
                          {filterBuckets.includes(b)?"✓ ":""}{b}
                          <span style={{background:filterBuckets.includes(b)?C.accent:"#444",color:"#fff",borderRadius:8,padding:"0 5px",fontSize:9,fontWeight:700}}>{cnt}</span>
                        </span>
                      );
                    })}
                  </div>
                </div>
                )}
                {/* Tag filter */}
                {allTagNames.length > 0 && (
                  <div style={{marginBottom:14}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Tag</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {allTagNames.map(t=>(
                        <span key={t} onClick={()=>toggleFilter(filterTags,setFilterTags,t)}
                          style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterTags.includes(t)?C.accent:"#333"}`,background:filterTags.includes(t)?"rgba(232,255,71,0.1)":"transparent",color:filterTags.includes(t)?C.accent:"#888",transition:"all .12s"}}>
                          {filterTags.includes(t)?"✓ ":""}{t}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
                {/* Status filter */}
                {allStatuses.length > 0 && (
                  <div>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Status</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {allStatuses.map(s=>(
                        <span key={s} onClick={()=>toggleFilter(filterStatus,setFilterStatus,s)}
                          style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterStatus.includes(s)?C.accent:"#333"}`,background:filterStatus.includes(s)?"rgba(232,255,71,0.1)":"transparent",color:filterStatus.includes(s)?C.accent:"#888",transition:"all .12s"}}>
                          {filterStatus.includes(s)?"✓ ":""}{s}
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
          </div>
        </div>
      ) : (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,gap:12,flexWrap:"wrap"}}>
          <div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.2em",color:C.accent,textTransform:"uppercase",marginBottom:6}}>Urban Street / CRM</div>
            <h1 style={{fontSize:36,fontWeight:900,lineHeight:1,letterSpacing:"-0.02em",color:C.text}}>CONTACTS</h1>
          </div>
          <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
            <div className="us-mono" style={{fontSize:13,color:C.text,fontWeight:700}}><span style={{color:filtered.length < contacts.length ? C.accent : C.text}}>{filtered.length}</span><span style={{color:C.textMuted,fontWeight:400}}> / {contacts.length}</span></div>
            <div style={{position:"relative"}} ref={filterRef}>
              <button className="us-btn" onClick={()=>setShowFilters(v=>!v)} style={{padding:"8px 12px",fontSize:12,display:"flex",alignItems:"center",gap:6,borderColor: activeFilterCount>0?C.accent:"#252525",color: activeFilterCount>0?C.accent:"#888"}}>
                <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1 2h14l-5 6v5l-4-2V8L1 2z"/></svg>
                FILTER{activeFilterCount>0?` (${activeFilterCount})`:""}
              </button>
              {showFilters && (
                <div className="us-settings-panel" style={{minWidth:280}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.16em",color:C.accent,textTransform:"uppercase"}}>Filters</div>
                    {activeFilterCount>0 && <span onClick={clearAllFilters} style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.red,cursor:"pointer",letterSpacing:"0.08em",textTransform:"uppercase"}}>Clear all</span>}
                  </div>
                  {allBucketNames.length > 0 && (
                    <div style={{marginBottom:14}}>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Bucket</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {allBucketNames.map(b=>{
                          const cnt = contacts.filter(c=>(c.contact_buckets||[]).some(cb=>cb.buckets?.name===b)).length;
                          return (
                            <span key={b} onClick={()=>toggleFilter(filterBuckets,setFilterBuckets,b)}
                              style={{display:"inline-flex",alignItems:"center",gap:5,padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterBuckets.includes(b)?C.accent:"#333"}`,background:filterBuckets.includes(b)?"rgba(232,255,71,0.1)":"transparent",color:filterBuckets.includes(b)?C.accent:"#888",transition:"all .12s"}}>
                              {filterBuckets.includes(b)?"✓ ":""}{b}
                              <span style={{background:filterBuckets.includes(b)?C.accent:"#444",color:"#fff",borderRadius:8,padding:"0 5px",fontSize:9,fontWeight:700}}>{cnt}</span>
                            </span>
                          );
                        })}
                      </div>
                    </div>
                  )}
                  {allTagNames.length > 0 && (
                    <div style={{marginBottom:14}}>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Tag</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {allTagNames.map(t=>(
                          <span key={t} onClick={()=>toggleFilter(filterTags,setFilterTags,t)}
                            style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterTags.includes(t)?C.accent:"#333"}`,background:filterTags.includes(t)?"rgba(232,255,71,0.1)":"transparent",color:filterTags.includes(t)?C.accent:"#888",transition:"all .12s"}}>
                            {filterTags.includes(t)?"✓ ":""}{t}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                  {allStatuses.length > 0 && (
                    <div>
                      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:8}}>Status</div>
                      <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                        {allStatuses.map(s=>(
                          <span key={s} onClick={()=>toggleFilter(filterStatus,setFilterStatus,s)}
                            style={{display:"inline-flex",alignItems:"center",padding:"3px 9px",borderRadius:12,fontSize:11,fontFamily:"'JetBrains Mono',monospace",cursor:"pointer",border:`1px solid ${filterStatus.includes(s)?C.accent:"#333"}`,background:filterStatus.includes(s)?"rgba(232,255,71,0.1)":"transparent",color:filterStatus.includes(s)?C.accent:"#888",transition:"all .12s"}}>
                            {filterStatus.includes(s)?"✓ ":""}{s}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
            <div style={{position:"relative"}} ref={settingsRef}>
              <button className="us-btn" onClick={()=>setShowColSettings(v=>!v)} style={{padding:"8px 12px",fontSize:12}}>⚙ COLUMNS</button>
              {showColSettings && (
                <div className="us-settings-panel">
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,letterSpacing:"0.16em",color:C.accent,textTransform:"uppercase",marginBottom:4}}>Columns</div>
                  <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,marginBottom:12}}>Toggle · Drag to reorder</div>
                  {orderedCols.map(col=>(
                    <div
                      key={col.key}
                      className="us-col-toggle"
                      draggable={!col.always}
                      onDragStart={()=>onDragStart(col.key)}
                      onDragOver={e=>onDragOver(e,col.key)}
                      onDrop={onDrop}
                      onClick={()=>!col.always&&toggleCol(col.key)}
                      style={{cursor: col.always ? "default" : "grab"}}
                    >
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        {!col.always && <span style={{color:"#444",fontSize:12,lineHeight:1}}>⠿</span>}
                        {col.always && <span style={{width:16}}/>}
                        <span className="us-col-toggle-label" style={{color: visibleCols.includes(col.key) ? C.text : "#555"}}>{col.label}</span>
                      </div>
                      <div className={`us-switch${visibleCols.includes(col.key)?" on":""}`} style={{opacity: col.always ? 0.4 : 1}}/>
                    </div>
                  ))}
                </div>
              )}
            </div>
            <button className="us-btn" onClick={() => setShowImport(true)} style={{whiteSpace:"nowrap"}}>⬆ IMPORT CSV</button>
            <button className="us-btn" onClick={() => exportCSV(filtered)} style={{whiteSpace:"nowrap"}}>⬇ EXPORT CSV</button>
            <button className="us-btn us-edit-contact-btn" onClick={onNew} style={{whiteSpace:"nowrap"}}>+ NEW CONTACT</button>
            <input className="us-search" placeholder="Search contacts…" value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}}/>
          </div>
        </div>
      )}
      {mob && <button className="us-fab" onClick={onNew}>+</button>}
      {/* Active filter pills */}
      {activeFilterCount > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:16,alignItems:"center"}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:C.textMuted,letterSpacing:"0.1em",textTransform:"uppercase",marginRight:2}}>Filters:</span>
          {filterBuckets.map(b=>(
            <span key={b} className="us-tag-pill" style={{fontSize:11}} onClick={()=>toggleFilter(filterBuckets,setFilterBuckets,b)}>
              bucket: {b} <span className="us-tag-pill-remove">×</span>
            </span>
          ))}
          {filterTags.map(t=>(
            <span key={t} className="us-tag-pill" style={{fontSize:11}} onClick={()=>toggleFilter(filterTags,setFilterTags,t)}>
              tag: {t} <span className="us-tag-pill-remove">×</span>
            </span>
          ))}
          {filterStatus.map(s=>(
            <span key={s} className="us-tag-pill" style={{fontSize:11}} onClick={()=>toggleFilter(filterStatus,setFilterStatus,s)}>
              status: {s} <span className="us-tag-pill-remove">×</span>
            </span>
          ))}

const SigField = ({label, field, placeholder, type="text", form, set}) => (
